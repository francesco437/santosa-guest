<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosa — Tours & Excursions</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#3B6E87;--teal:#3DBFB7;--deep:#1A6E6A;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:white;min-height:100vh;}
.header{background:rgba(0,0,0,0.25);backdrop-filter:blur(20px);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.1);}
.back-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.85);text-decoration:none;font-size:14px;font-weight:600;}
.back-btn svg{width:18px;height:18px;}
.header-title{font-size:17px;font-weight:800;}
.room-badge{background:rgba(255,255,255,0.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;}
.hero{padding:32px 20px 24px;text-align:center;}
.hero-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:8px;}
.hero-title{font-size:30px;font-weight:800;line-height:1.15;margin-bottom:10px;}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.7);max-width:320px;margin:0 auto;line-height:1.5;}
.loading-wrap{padding:60px 20px;text-align:center;}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:rgba(255,255,255,0.7);font-size:14px;}
.empty-state{padding:60px 20px;text-align:center;color:rgba(255,255,255,0.6);}
.empty-state .ei{font-size:48px;margin-bottom:12px;}
.tours-list{padding:0 16px 40px;display:flex;flex-direction:column;gap:20px;}
.tour-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(16px);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);}
.tour-hero{position:relative;width:100%;height:220px;overflow:hidden;background:rgba(0,0,0,0.3);}
.tour-hero img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.3s;}
.tour-hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(59,110,135,0.5),rgba(26,74,94,0.5));font-size:56px;opacity:0.5;}
.hero-price-badge{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);padding:6px 14px;border-radius:20px;font-size:14px;font-weight:800;}
.gallery-strip{display:flex;gap:6px;padding:10px 12px;background:rgba(0,0,0,0.2);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.gallery-strip::-webkit-scrollbar{display:none;}
.gallery-thumb{width:72px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;}
.gallery-thumb.active{border-color:#3DBFB7;}
.tour-body{padding:18px 16px;}
.tour-name{font-size:20px;font-weight:800;margin-bottom:6px;line-height:1.2;}
.tour-desc{font-size:14px;color:rgba(255,255,255,0.75);line-height:1.55;margin-bottom:14px;}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.pill{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.2);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);}
.pill.pickup{background:rgba(61,191,183,0.25);border-color:rgba(61,191,183,0.4);color:#7ee8e4;}
.includes-section{margin-bottom:16px;}
.includes-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px;}
.includes-list{display:flex;flex-wrap:wrap;gap:6px;}
.include-tag{background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:12px;font-size:12px;color:rgba(255,255,255,0.85);display:flex;align-items:center;gap:5px;}
.include-tag::before{content:'✓';color:#3DBFB7;font-weight:800;font-size:11px;}
.booking-form{background:rgba(0,0,0,0.2);border-radius:14px;padding:16px;margin-top:4px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;display:block;}
.form-group{margin-bottom:12px;}
.form-input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);border-radius:12px;font-family:'Source Sans 3',sans-serif;font-size:15px;color:white;outline:none;-webkit-appearance:none;transition:border-color 0.2s;}
.form-input::placeholder{color:rgba(255,255,255,0.4);}
.form-input:focus{border-color:rgba(61,191,183,0.7);background:rgba(255,255,255,0.16);}
.pax-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.pax-label{font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);}
.pax-ctrl{display:flex;align-items:center;gap:12px;}
.pax-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);color:white;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.pax-btn:hover{background:rgba(255,255,255,0.25);}
.pax-count{font-size:18px;font-weight:800;min-width:24px;text-align:center;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid rgba(255,255,255,0.15);margin-bottom:14px;}
.total-label{font-size:13px;color:rgba(255,255,255,0.7);}
.total-amount{font-size:22px;font-weight:800;}
.book-btn{width:100%;padding:16px;background:white;color:#2a6e7a;border:none;border-radius:14px;font-family:'Source Sans 3',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.book-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.3);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:#1e4a5f;border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:24px 20px 40px;position:relative;}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.3);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:20px;}
.modal-close{position:absolute;top:20px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.stripe-field{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.2);border-radius:12px;padding:14px;margin-bottom:12px;}
.stripe-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.card-input{width:100%;background:transparent;border:none;outline:none;font-family:'Source Sans 3',sans-serif;font-size:15px;color:white;}
.card-input::placeholder{color:rgba(255,255,255,0.4);}
.secure-note{font-size:11px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:5px;}
.pay-btn{width:100%;padding:16px;background:#3DBFB7;color:white;border:none;border-radius:14px;font-family:'Source Sans 3',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:opacity 0.2s;}
.pay-btn:disabled{opacity:0.5;cursor:not-allowed;}
.success-screen{text-align:center;padding:10px 0;}
.success-icon{font-size:56px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:800;margin-bottom:8px;}
.success-msg{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:20px;}
.detail-box{background:rgba(255,255,255,0.1);border-radius:14px;padding:16px;text-align:left;font-size:14px;margin-bottom:16px;}
.detail-box .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.1);}
.detail-box .row:last-child{border:none;}
.detail-box .row span:first-child{color:rgba(255,255,255,0.6);}
.detail-box .row span:last-child{font-weight:700;}
.done-btn{width:100%;padding:14px;background:white;color:#2a6e7a;border:none;border-radius:12px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.wa-bar{margin:0 16px 24px;background:rgba(37,211,102,0.2);border:1px solid rgba(37,211,102,0.4);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.wa-icon{font-size:24px;}
.wa-text{flex:1;font-size:13px;color:rgba(255,255,255,0.85);line-height:1.4;}
.wa-btn{background:#25D366;color:white;border:none;padding:8px 14px;border-radius:10px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,46,59,0.95);color:white;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:500;opacity:0;pointer-events:none;transition:all 0.3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.pay-method-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.pay-method-btn{padding:16px 10px;border-radius:14px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.2s;}
.pay-method-btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.4);}
.pay-method-btn.selected{background:rgba(61,191,183,0.25);border-color:#3DBFB7;color:#7ee8e4;}
.pay-method-icon{font-size:26px;display:block;margin-bottom:6px;}
.cash-note{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.5;margin-bottom:16px;}
.card-section{display:none;}
.card-section.visible{display:block;}
</style>
</head>
<body>

<div class="header">
  <a href="santosa-menu.html" class="back-btn" id="backLink">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Menu
  </a>
  <div class="header-title">Tours & Excursions</div>
  <div class="room-badge" id="roomBadge">Room —</div>
</div>

<div class="hero">
  <div class="hero-label">Explore Phuket</div>
  <div class="hero-title">Discover Paradise</div>
  <div class="hero-sub">Hand-picked day trips and excursions from Santosa</div>
</div>

<div id="mainContent">
  <div class="loading-wrap">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading tours…</div>
  </div>
</div>

<div class="wa-bar">
  <div class="wa-icon">💬</div>
  <div class="wa-text">Questions about our tours? Our concierge is happy to help.</div>
  <button class="wa-btn" onclick="openWA()">WhatsApp</button>
</div>

<div class="modal-overlay" id="payModal">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB='https://zycptgrxnvbqsbngfuqi.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';
const WA='393465309386';

const params=new URLSearchParams(location.search);
const roomNum=params.get('room')||'';
if(roomNum){
  document.getElementById('roomBadge').textContent='Room '+roomNum;
  document.getElementById('backLink').href='santosa-menu.html?room='+roomNum;
}

async function sb(path,opts={}){
  const r=await fetch(`${SB}/rest/v1/${path}`,{
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'return=representation',...opts.headers},
    ...opts
  });
  if(!r.ok) throw new Error(await r.text());
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

let tours=[];
let paxState={};
let currentBooking=null;

async function loadTours(){
  try{
    const toursData=await sb('tours?active=eq.true&order=sort_order,created_at');
    if(!toursData||!toursData.length){renderEmpty();return;}
    const ids=toursData.map(t=>t.id).join(',');
    let images=[];
    try{images=await sb(`tour_images?tour_id=in.(${ids})&order=sort_order`)||[];}catch(e){}
    tours=toursData.map(t=>({...t,images:images.filter(i=>i.tour_id===t.id),includes:parseIncludes(t.includes)}));
    tours.forEach(t=>{paxState[t.id]=1;});
    renderTours();
  }catch(e){
    console.error(e);
    document.getElementById('mainContent').innerHTML=`<div class="empty-state"><div class="ei">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:6px">Unable to load tours</div><div style="font-size:14px">Please contact the front desk</div></div>`;
  }
}

function parseIncludes(val){
  if(!val)return[];
  if(Array.isArray(val))return val;
  try{return JSON.parse(val);}catch(e){return[];}
}

function renderEmpty(){
  document.getElementById('mainContent').innerHTML=`<div class="empty-state"><div class="ei">🗺️</div><div style="font-size:18px;font-weight:700;margin-bottom:6px">No tours available</div><div style="font-size:14px">Check back soon or contact our concierge</div></div>`;
}

function renderTours(){
  const tomorrow=new Date();
  tomorrow.setDate(tomorrow.getDate()+1);
  const minDate=tomorrow.toISOString().split('T')[0];

  const html=tours.map(t=>{
    const hero=t.images.find(i=>i.is_hero)||t.images[0];
    const gallery=t.images.slice(0,8);
    const hasGallery=gallery.length>1;

    return `
    <div class="tour-card" id="card-${t.id}">
      <div class="tour-hero" id="hero-${t.id}">
        ${hero
          ?`<img id="heroimg-${t.id}" src="${hero.url}" alt="${t.name}" onerror="this.parentElement.innerHTML='<div class=tour-hero-ph>🏝️</div>'">`
          :`<div class="tour-hero-ph">🏝️</div>`}
        <div class="hero-price-badge">${(t.price_per_person||0).toLocaleString()} THB / person</div>
      </div>
      ${hasGallery?`
      <div class="gallery-strip" id="gallery-${t.id}">
        ${gallery.map((img,i)=>`<img class="gallery-thumb${i===0?' active':''}" src="${img.url}" onclick="setHero('${t.id}','${img.url}',this)" onerror="this.style.display='none'">`).join('')}
      </div>`:''}
      <div class="tour-body">
        <div class="tour-name">${t.name}</div>
        ${t.description?`<div class="tour-desc">${t.description}</div>`:''}
        <div class="pills">
          ${t.duration?`<span class="pill">⏱ ${t.duration}</span>`:''}
          ${t.max_pax?`<span class="pill">👥 Max ${t.max_pax} guests</span>`:''}
          ${t.pickup?`<span class="pill pickup">🚐 Hotel pickup</span>`:''}
        </div>
        ${t.includes.length?`
        <div class="includes-section">
          <div class="includes-label">What's included</div>
          <div class="includes-list">${t.includes.map(inc=>`<span class="include-tag">${inc}</span>`).join('')}</div>
        </div>`:''}
        <div class="booking-form">
          <div class="form-group">
            <label class="form-label">Select Date</label>
            <input type="date" class="form-input" id="date-${t.id}" min="${minDate}" value="${minDate}">
          </div>
          <div class="pax-row">
            <div class="pax-label">Number of Guests</div>
            <div class="pax-ctrl">
              <button class="pax-btn" onclick="changePax('${t.id}',-1,${t.max_pax||20})">−</button>
              <div class="pax-count" id="pax-${t.id}">1</div>
              <button class="pax-btn" onclick="changePax('${t.id}',1,${t.max_pax||20})">+</button>
            </div>
          </div>
          <div class="total-row">
            <div class="total-label">Total</div>
            <div class="total-amount" id="total-${t.id}">${(t.price_per_person||0).toLocaleString()} THB</div>
          </div>
          <button class="book-btn" onclick="startBooking('${t.id}')">Book Now</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=`<div class="tours-list">${html}</div>`;
}

function setHero(tourId,url,el){
  const img=document.getElementById('heroimg-'+tourId);
  if(img)img.src=url;
  document.querySelectorAll(`#gallery-${tourId} .gallery-thumb`).forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function changePax(tourId,delta,maxPax){
  const cur=paxState[tourId]||1;
  const next=Math.max(1,Math.min(maxPax,cur+delta));
  paxState[tourId]=next;
  document.getElementById('pax-'+tourId).textContent=next;
  const t=tours.find(x=>x.id===tourId);
  if(t)document.getElementById('total-'+tourId).textContent=((t.price_per_person||0)*next).toLocaleString()+' THB';
}

function startBooking(tourId){
  const t=tours.find(x=>x.id===tourId);
  const date=document.getElementById('date-'+tourId).value;
  const pax=paxState[tourId]||1;
  if(!date){showToast('Please select a date');return;}
  if(!roomNum){showToast('Room number not found');return;}
  currentBooking={tour:t,date,pax,total:(t.price_per_person||0)*pax};
  showPaymentModal();
}

function showPaymentModal(){
  const b=currentBooking;
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-title">Confirm Booking</div>
    <div class="modal-sub">${b.tour.name}</div>
    <div class="detail-box" style="margin-bottom:20px">
      <div class="row"><span>Date</span><span>${formatDate(b.date)}</span></div>
      <div class="row"><span>Guests</span><span>${b.pax} person${b.pax>1?'s':''}</span></div>
      <div class="row"><span>Room</span><span>${roomNum}</span></div>
      <div class="row"><span>Total</span><span style="color:#7ee8e4;font-size:17px">${b.total.toLocaleString()} THB</span></div>
    </div>
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input type="text" class="form-input" id="guestName" placeholder="Full name" autocomplete="name">
    </div>
    <label class="form-label">Payment Method</label>
    <div class="pay-method-row">
      <button class="pay-method-btn" id="btn-card" onclick="selectMethod('card')">
        <span class="pay-method-icon">💳</span>Pay by Card
      </button>
      <button class="pay-method-btn" id="btn-cash" onclick="selectMethod('cash')">
        <span class="pay-method-icon">🏨</span>Pay at Hotel
      </button>
    </div>

    <!-- CARD SECTION -->
    <div class="card-section" id="cardSection">
      <label class="form-label">Card Details</label>
      <div class="stripe-field">
        <input class="card-input" id="cardNum" placeholder="1234 5678 9012 3456" maxlength="19" inputmode="numeric" oninput="formatCard(this)">
      </div>
      <div class="stripe-row">
        <div class="stripe-field"><input class="card-input" id="cardExp" placeholder="MM / YY" maxlength="7" inputmode="numeric" oninput="formatExp(this)"></div>
        <div class="stripe-field"><input class="card-input" id="cardCvc" placeholder="CVC" maxlength="3" inputmode="numeric"></div>
      </div>
      <div class="secure-note">🔒 Secured by Stripe</div>
      <button class="pay-btn" id="payBtn" onclick="processPayment('card')">Pay ${b.total.toLocaleString()} THB</button>
      <div style="margin-top:12px;text-align:center;font-size:12px;color:rgba(255,255,255,0.4)">Test card: 4242 4242 4242 4242</div>
    </div>

    <!-- CASH SECTION -->
    <div class="card-section" id="cashSection">
      <div class="cash-note">💡 Your booking will be reserved and our team will contact you to confirm payment at the hotel. No payment required now.</div>
      <button class="pay-btn" id="cashBtn" onclick="processPayment('cash')">Confirm Booking</button>
    </div>
  `;
  document.getElementById('payModal').classList.add('open');
}

function selectMethod(method){
  document.getElementById('btn-card').classList.toggle('selected', method==='card');
  document.getElementById('btn-cash').classList.toggle('selected', method==='cash');
  document.getElementById('cardSection').classList.toggle('visible', method==='card');
  document.getElementById('cashSection').classList.toggle('visible', method==='cash');
}

function formatCard(el){
  let v=el.value.replace(/\D/g,'').substring(0,16);
  el.value=v.replace(/(.{4})/g,'$1 ').trim();
}
function formatExp(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>=3)v=v.substring(0,2)+' / '+v.substring(2,4);
  el.value=v;
}

async function processPayment(method){
  const name=document.getElementById('guestName')?.value?.trim();
  if(!name){showToast('Please enter your name');return;}

  if(method==='card'){
    const card=document.getElementById('cardNum')?.value?.replace(/\s/g,'');
    if(!card||card.length<16){showToast('Please enter card number');return;}
    const btn=document.getElementById('payBtn');
    btn.disabled=true;btn.textContent='Processing…';
    await new Promise(r=>setTimeout(r,1800));
    try{
      await sb('tour_bookings',{
        method:'POST',
        body:JSON.stringify({
          tour_id:currentBooking.tour.id,
          room_number:roomNum,
          guest_name:name,
          date:currentBooking.date,
          pax:currentBooking.pax,
          total:currentBooking.total,
          status:'confirmed',
          payment_method:'card'
        })
      });
      const msg=`💳 *New Tour Booking — Card*\nRoom ${roomNum} · ${name}\n*${currentBooking.tour.name}*\nDate: ${formatDate(currentBooking.date)}\nGuests: ${currentBooking.pax}\nTotal: ${currentBooking.total.toLocaleString()} THB\nStatus: ✅ Confirmed`;
      const waLink=`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
      showSuccessScreen(name,waLink,'card');
    }catch(e){
      console.error(e);
      btn.disabled=false;
      btn.textContent=`Pay ${currentBooking.total.toLocaleString()} THB`;
      showToast('Payment error — please try again');
    }
  } else {
    // CASH
    const btn=document.getElementById('cashBtn');
    btn.disabled=true;btn.textContent='Confirming…';
    await new Promise(r=>setTimeout(r,800));
    try{
      await sb('tour_bookings',{
        method:'POST',
        body:JSON.stringify({
          tour_id:currentBooking.tour.id,
          room_number:roomNum,
          guest_name:name,
          date:currentBooking.date,
          pax:currentBooking.pax,
          total:currentBooking.total,
          status:'pending',
          payment_method:'cash'
        })
      });
      const msg=`🏨 *New Tour Booking — Pay at Hotel*\nRoom ${roomNum} · ${name}\n*${currentBooking.tour.name}*\nDate: ${formatDate(currentBooking.date)}\nGuests: ${currentBooking.pax}\nTotal: ${currentBooking.total.toLocaleString()} THB\nStatus: ⏳ Pending payment`;
      const waLink=`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
      showSuccessScreen(name,waLink,'cash');
    }catch(e){
      console.error(e);
      btn.disabled=false;
      btn.textContent='Confirm Booking';
      showToast('Error — please try again');
    }
  }
}

function showSuccessScreen(name,waLink,method){
  const b=currentBooking;
  const isCard=method==='card';
  document.getElementById('modalContent').innerHTML=`
    <div class="success-screen">
      <div class="success-icon">${isCard?'🎉':'✅'}</div>
      <div class="success-title">${isCard?'Booking Confirmed!':'Booking Reserved!'}</div>
      <div class="success-msg">${isCard
        ?`Your adventure is booked, ${name}. Our team will contact you with pickup details.`
        :`Your tour is reserved, ${name}. Our team will contact you to confirm and arrange payment at the hotel.`
      }</div>
      <div class="detail-box">
        <div class="row"><span>Tour</span><span>${b.tour.name}</span></div>
        <div class="row"><span>Date</span><span>${formatDate(b.date)}</span></div>
        <div class="row"><span>Guests</span><span>${b.pax}</span></div>
        <div class="row"><span>Room</span><span>${roomNum}</span></div>
        <div class="row"><span>${isCard?'Total Paid':'Total Due'}</span><span style="${isCard?'':'color:#f6ad55'}">${b.total.toLocaleString()} THB${isCard?'':' (at hotel)'}</span></div>
        <div class="row"><span>Payment</span><span>${isCard?'💳 Card':'🏨 At Hotel'}</span></div>
      </div>
      <a href="${waLink}" target="_blank" style="display:block;width:100%;padding:14px;background:#25D366;color:white;border-radius:12px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:700;text-align:center;text-decoration:none;margin-bottom:10px">💬 Contact Us on WhatsApp</a>
      <button class="done-btn" onclick="closeModal()">Done</button>
    </div>`;
}

function closeModal(){
  document.getElementById('payModal').classList.remove('open');
  currentBooking=null;
}

function formatDate(d){
  return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
}

function openWA(){
  const msg=roomNum?`Hello, I'm in Room ${roomNum} and have a question about your tours.`:'Hello, I have a question about your tours.';
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('payModal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

loadTours();
</script>
