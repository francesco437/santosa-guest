<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosa — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:       #3DBFB7;
    --teal-dark:  #2A9E97;
    --teal-deep:  #1A6E6A;
    --teal-light: #B2E8E5;
    --teal-foam:  #EBF9F8;
    --white:      #FFFFFF;
    --bg:         #F4FAFA;
    --text:       #0F2E2D;
    --text-mid:   #3A6664;
    --text-soft:  #7AADAB;
    --border:     #C8EDED;
    --gold:       #D4A847;
    --red:        #E53935;
    --green:      #2E7D52;
    --orange:     #E65100;
    --sidebar-w:  240px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ── LOGIN ── */
  .login-wrap {
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, var(--teal-deep) 0%, var(--teal-dark) 100%);
  }
  .login-box {
    background:var(--white);
    border-radius:24px;
    padding:48px 40px;
    width:100%; max-width:400px;
    box-shadow:0 20px 60px rgba(26,110,106,0.3);
    text-align:center;
  }
  .login-logo {
    font-family:'DM Serif Display',serif;
    font-size:32px;
    color:var(--teal-deep);
    margin-bottom:4px;
  }
  .login-sub {
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-soft);
    margin-bottom:36px;
  }
  .login-field {
    width:100%;
    padding:14px 16px;
    border:1.5px solid var(--border);
    border-radius:12px;
    font-family:'DM Sans',sans-serif;
    font-size:15px;
    color:var(--text);
    background:var(--teal-foam);
    outline:none;
    margin-bottom:14px;
    transition:border-color 0.15s;
    text-align:center;
    letter-spacing:1px;
  }
  .login-field:focus { border-color:var(--teal); }
  .login-btn {
    width:100%;
    padding:15px;
    background:var(--teal);
    color:var(--white);
    border:none;
    border-radius:12px;
    font-family:'DM Sans',sans-serif;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.2s;
    margin-top:4px;
  }
  .login-btn:hover { background:var(--teal-dark); transform:translateY(-1px); }
  .login-error { color:var(--red); font-size:13px; margin-top:10px; display:none; }

  /* ── APP SHELL ── */
  .app { display:none; min-height:100vh; }

  /* SIDEBAR */
  .sidebar {
    position:fixed;
    top:0; left:0; bottom:0;
    width:var(--sidebar-w);
    background:var(--teal-deep);
    display:flex;
    flex-direction:column;
    z-index:50;
  }
  .sidebar-logo {
    padding:28px 24px 20px;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }
  .sidebar-logo-name {
    font-family:'DM Serif Display',serif;
    font-size:22px;
    color:var(--white);
  }
  .sidebar-logo-sub {
    font-size:10px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--teal-light);
    margin-top:2px;
  }
  .sidebar-nav { flex:1; padding:16px 0; }
  .nav-item {
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 24px;
    font-size:14px;
    font-weight:500;
    color:rgba(255,255,255,0.65);
    cursor:pointer;
    transition:all 0.15s;
    border-left:3px solid transparent;
  }
  .nav-item:hover { color:var(--white); background:rgba(255,255,255,0.07); }
  .nav-item.active { color:var(--white); background:rgba(61,191,183,0.18); border-left-color:var(--teal); }
  .nav-icon { font-size:18px; width:22px; text-align:center; }
  .nav-badge {
    background:var(--teal);
    color:var(--white);
    border-radius:50px;
    padding:2px 8px;
    font-size:11px;
    font-weight:700;
    margin-left:auto;
  }
  .sidebar-footer {
    padding:20px 24px;
    border-top:1px solid rgba(255,255,255,0.1);
  }
  .logout-btn {
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:rgba(255,255,255,0.5);
    cursor:pointer; transition:color 0.15s;
    background:none; border:none; font-family:'DM Sans',sans-serif;
  }
  .logout-btn:hover { color:var(--white); }

  /* MAIN */
  .main {
    margin-left:var(--sidebar-w);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .topbar {
    background:var(--white);
    border-bottom:1px solid var(--border);
    padding:18px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky; top:0; z-index:40;
  }
  .topbar-title {
    font-family:'DM Serif Display',serif;
    font-size:22px;
    color:var(--teal-deep);
  }
  .topbar-title em { font-style:italic; color:var(--teal-dark); }
  .topbar-time { font-size:12px; color:var(--text-soft); }

  .content { padding:28px 32px; flex:1; }

  /* ── PAGE VISIBILITY ── */
  .page { display:none; }
  .page.active { display:block; }

  /* ── STATS ROW ── */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat-card {
    background:var(--white);
    border-radius:16px;
    padding:20px;
    border:1px solid var(--border);
  }
  .stat-label { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-soft); }
  .stat-value { font-family:'DM Serif Display',serif; font-size:32px; color:var(--teal-deep); margin-top:6px; }
  .stat-sub { font-size:12px; color:var(--text-soft); margin-top:2px; }

  /* ── ORDERS TABLE ── */
  .section-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .section-head h2 {
    font-family:'DM Serif Display',serif;
    font-size:20px; color:var(--teal-deep);
  }
  .filter-tabs { display:flex; gap:6px; }
  .filter-tab {
    padding:6px 14px;
    border-radius:50px;
    font-size:12px; font-weight:600;
    cursor:pointer; border:none;
    background:var(--teal-foam);
    color:var(--text-soft);
    transition:all 0.15s;
    font-family:'DM Sans',sans-serif;
  }
  .filter-tab:hover { background:var(--teal-light); color:var(--teal-deep); }
  .filter-tab.active { background:var(--teal); color:var(--white); }

  .orders-list { display:flex; flex-direction:column; gap:12px; }

  .order-card {
    background:var(--white);
    border-radius:16px;
    border:1px solid var(--border);
    overflow:hidden;
    transition:box-shadow 0.2s;
  }
  .order-card:hover { box-shadow:0 4px 20px rgba(61,191,183,0.1); }

  .order-card-head {
    display:flex; align-items:center; gap:16px;
    padding:16px 20px;
    border-bottom:1px solid var(--teal-foam);
  }
  .order-room {
    font-family:'DM Serif Display',serif;
    font-size:22px; color:var(--teal-deep);
    min-width:60px;
  }
  .order-meta { flex:1; }
  .order-time { font-size:12px; color:var(--text-soft); }
  .order-total { font-size:15px; font-weight:700; color:var(--teal-dark); }
  .order-notes-badge {
    font-size:11px; color:var(--orange);
    background:#FFF3E0; border-radius:6px;
    padding:3px 8px; font-weight:500;
  }

  /* STATUS BADGE */
  .status-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:5px 12px; border-radius:50px;
    font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .status-new       { background:#E3F2FD; color:#1565C0; }
  .status-preparing { background:#FFF8E1; color:#F57F17; }
  .status-delivered { background:#E8F5E9; color:#2E7D32; }
  .status-paid      { background:#E8F5E9; color:#1B5E20; }

  .order-items-list {
    padding:12px 20px;
    display:flex; flex-direction:column; gap:4px;
  }
  .order-item-row {
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--text-mid);
  }
  .order-item-row span:first-child { font-size:16px; width:22px; }
  .order-item-name { flex:1; }
  .order-item-qty { color:var(--text-soft); }
  .order-item-price { font-weight:600; color:var(--teal-dark); min-width:70px; text-align:right; }

  .order-notes {
    padding:8px 20px 12px;
    font-size:12px; color:var(--orange);
    font-style:italic;
  }

  .order-actions {
    display:flex; gap:8px;
    padding:12px 20px;
    border-top:1px solid var(--teal-foam);
    background:var(--bg);
  }
  .action-btn {
    flex:1; padding:9px;
    border:none; border-radius:10px;
    font-family:'DM Sans',sans-serif;
    font-size:12px; font-weight:600;
    cursor:pointer; transition:all 0.15s;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .btn-preparing { background:#FFF8E1; color:#F57F17; }
  .btn-preparing:hover { background:#FFE082; }
  .btn-delivered { background:#E8F5E9; color:#2E7D32; }
  .btn-delivered:hover { background:#A5D6A7; }
  .btn-paid { background:var(--teal); color:var(--white); }
  .btn-paid:hover { background:var(--teal-dark); }
  .btn-delete { background:#FFEBEE; color:var(--red); max-width:44px; }
  .btn-delete:hover { background:#FFCDD2; }

  /* EMPTY STATE */
  .empty-state {
    text-align:center; padding:60px 20px;
    color:var(--text-soft);
  }
  .empty-state .ei { font-size:56px; margin-bottom:16px; opacity:0.6; }
  .empty-state p { font-size:14px; font-weight:300; line-height:1.7; }

  /* LOADING */
  .loading { text-align:center; padding:60px 20px; color:var(--text-soft); }
  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--teal); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── MENU PAGE ── */
  .menu-toolbar {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px;
  }
  .add-btn {
    display:flex; align-items:center; gap:8px;
    padding:10px 20px;
    background:var(--teal); color:var(--white);
    border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif;
    font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.2s;
  }
  .add-btn:hover { background:var(--teal-dark); transform:translateY(-1px); }

  .menu-cat-section { margin-bottom:28px; }
  .menu-cat-title {
    font-family:'DM Serif Display',serif;
    font-size:18px; color:var(--teal-deep);
    margin-bottom:12px;
    display:flex; align-items:center; gap:10px;
  }
  .menu-cat-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .menu-items-grid { display:flex; flex-direction:column; gap:8px; }

  .menu-item-row {
    background:var(--white);
    border-radius:12px;
    padding:14px 16px;
    display:flex; align-items:center; gap:14px;
    border:1px solid var(--border);
    transition:all 0.15s;
  }
  .menu-item-row.inactive { opacity:0.45; }
  .menu-item-row:hover { box-shadow:0 3px 12px rgba(61,191,183,0.08); }
  .mi-emoji { font-size:24px; width:36px; text-align:center; }
  .mi-info { flex:1; }
  .mi-name { font-size:14px; font-weight:600; color:var(--text); }
  .mi-desc { font-size:12px; color:var(--text-soft); margin-top:2px; font-weight:300; }
  .mi-price { font-size:14px; font-weight:700; color:var(--teal-dark); min-width:70px; text-align:right; }
  .mi-actions { display:flex; gap:6px; }
  .mi-btn {
    width:32px; height:32px; border-radius:8px; border:none;
    cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .mi-edit { background:var(--teal-foam); color:var(--teal-dark); }
  .mi-edit:hover { background:var(--teal-light); }
  .mi-toggle { background:#FFF8E1; color:#F57F17; }
  .mi-toggle:hover { background:#FFE082; }
  .mi-del { background:#FFEBEE; color:var(--red); }
  .mi-del:hover { background:#FFCDD2; }

  /* ── MODAL ── */
  .modal-overlay {
    position:fixed; inset:0;
    background:rgba(10,40,38,0.55);
    backdrop-filter:blur(4px);
    z-index:200;
    display:none; align-items:center; justify-content:center;
    padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--white);
    border-radius:20px;
    padding:32px;
    width:100%; max-width:480px;
    box-shadow:0 20px 60px rgba(26,110,106,0.25);
  }
  .modal-title {
    font-family:'DM Serif Display',serif;
    font-size:22px; color:var(--teal-deep);
    margin-bottom:24px;
  }
  .form-row { margin-bottom:16px; }
  .form-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-soft); margin-bottom:6px; display:block; }
  .form-input, .form-select, .form-textarea {
    width:100%;
    padding:11px 14px;
    border:1.5px solid var(--border);
    border-radius:10px;
    font-family:'DM Sans',sans-serif;
    font-size:14px; color:var(--text);
    background:var(--teal-foam);
    outline:none;
    transition:border-color 0.15s;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--teal); }
  .form-textarea { resize:vertical; min-height:80px; }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-btns { display:flex; gap:10px; margin-top:24px; }
  .modal-save {
    flex:1; padding:13px;
    background:var(--teal); color:var(--white);
    border:none; border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
    cursor:pointer; transition:all 0.2s;
  }
  .modal-save:hover { background:var(--teal-dark); }
  .modal-cancel {
    padding:13px 20px;
    background:var(--teal-foam); color:var(--text-mid);
    border:1px solid var(--border); border-radius:12px;
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
    cursor:pointer; transition:all 0.15s;
  }
  .modal-cancel:hover { background:var(--teal-light); }

  /* TOAST */
  .toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--teal-deep); color:var(--white);
    padding:11px 26px; border-radius:50px;
    font-size:13px; font-weight:500;
    z-index:500; opacity:0; pointer-events:none;
    transition:all 0.25s; white-space:nowrap;
    box-shadow:0 6px 20px rgba(26,110,106,0.3);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* REALTIME DOT */
  .live-dot {
    display:inline-block;
    width:8px; height:8px;
    border-radius:50%;
    background:var(--teal);
    animation:pulse 1.5s infinite;
    margin-right:6px;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(1.3); }
  }

  /* RESPONSIVE */
  @media (max-width:768px) {
    .sidebar { transform:translateX(-100%); transition:transform 0.3s; }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .content { padding:20px 16px; }
    .topbar { padding:16px 20px; }
    .hamburger { display:flex !important; }
  }
  .hamburger {
    display:none;
    background:none; border:none;
    font-size:22px; cursor:pointer; color:var(--teal-deep);
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Santosa</div>
    <div class="login-sub">Admin Dashboard</div>
    <input class="login-field" type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-name">Santosa</div>
      <div class="sidebar-logo-sub">Admin Panel</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="showPage('orders',this)">
        <span class="nav-icon">📋</span> Orders
        <span class="nav-badge" id="newOrdersBadge" style="display:none">0</span>
      </div>
      <div class="nav-item" onclick="showPage('menu',this)">
        <span class="nav-icon">🍽️</span> Menu
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">⬅ Logout</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="topbarTitle"><em>Orders</em></div>
      <div class="topbar-time"><span class="live-dot"></span><span id="clock"></span></div>
    </div>

    <div class="content">

      <!-- ── ORDERS PAGE ── -->
      <div class="page active" id="page-orders">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">New</div>
            <div class="stat-value" id="stat-new">—</div>
            <div class="stat-sub">Awaiting prep</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Preparing</div>
            <div class="stat-value" id="stat-preparing">—</div>
            <div class="stat-sub">In kitchen</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Delivered</div>
            <div class="stat-value" id="stat-delivered">—</div>
            <div class="stat-sub">Today</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Revenue</div>
            <div class="stat-value" id="stat-revenue">—</div>
            <div class="stat-sub">Today (THB)</div>
          </div>
        </div>

        <div class="section-head">
          <h2>Live Orders</h2>
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterOrders('all',this)">All</button>
            <button class="filter-tab" onclick="filterOrders('new',this)">New</button>
            <button class="filter-tab" onclick="filterOrders('preparing',this)">Preparing</button>
            <button class="filter-tab" onclick="filterOrders('delivered',this)">Delivered</button>
            <button class="filter-tab" onclick="filterOrders('paid',this)">Paid</button>
          </div>
        </div>
        <div class="orders-list" id="ordersList">
          <div class="loading"><div class="spinner"></div><p>Loading orders…</p></div>
        </div>
      </div>

      <!-- ── MENU PAGE ── -->
      <div class="page" id="page-menu">
        <div class="menu-toolbar">
          <div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--teal-deep);">Menu Items</div>
          <button class="add-btn" onclick="openItemModal()">＋ Add Item</button>
        </div>
        <div id="menuContent">
          <div class="loading"><div class="spinner"></div><p>Loading menu…</p></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ── ITEM MODAL ── -->
<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Item</div>
    <div class="form-row">
      <label class="form-label">Category</label>
      <select class="form-select" id="fCategory">
        <option value="breakfast">Breakfast</option>
        <option value="daymenu">Day Menu</option>
        <option value="healthy">Healthy</option>
        <option value="drinks">Drinks</option>
      </select>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label class="form-label">Emoji</label>
        <input class="form-input" id="fEmoji" placeholder="🍽️" maxlength="4">
      </div>
      <div class="form-row" style="margin:0">
        <label class="form-label">Price (THB)</label>
        <input class="form-input" id="fPrice" type="number" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Name</label>
      <input class="form-input" id="fName" placeholder="Item name">
    </div>
    <div class="form-row">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="fDesc" placeholder="Ingredients and details…"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Sort Order</label>
      <input class="form-input" id="fSort" type="number" placeholder="0">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeItemModal()">Cancel</button>
      <button class="modal-save" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────
  const SUPABASE_URL = 'https://zycptgrxnvbqsbngfuqi.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';
  const ADMIN_PASS   = 'santosa2024';

  const CATEGORIES = { breakfast:'Breakfast', daymenu:'Day Menu', healthy:'Healthy', drinks:'Drinks' };
  const CAT_EMOJI  = { breakfast:'🥐', daymenu:'🍽️', healthy:'🥗', drinks:'☕' };

  let allOrders  = [];
  let allMenu    = [];
  let currentFilter = 'all';
  let editingItemId = null;
  let pollInterval  = null;

  // ── SUPABASE ─────────────────────────────────────────
  async function sb(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...options.headers
      },
      ...options
    });
    if (!res.ok) { const e = await res.text(); throw new Error(e); }
    const txt = await res.text();
    return txt ? JSON.parse(txt) : null;
  }

  // ── LOGIN ─────────────────────────────────────────────
  function doLogin() {
    const pass = document.getElementById('loginPass').value;
    if (pass === ADMIN_PASS) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      startApp();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginPass').value = '';
    }
  }

  function doLogout() {
    clearInterval(pollInterval);
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('loginPass').value = '';
  }

  // ── START APP ─────────────────────────────────────────
  function startApp() {
    updateClock();
    setInterval(updateClock, 1000);
    loadOrders();
    pollInterval = setInterval(loadOrders, 15000); // refresh every 15s
  }

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB', { timeZone:'Asia/Bangkok', hour12:false });
  }

  // ── NAVIGATION ───────────────────────────────────────
  function showPage(page, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    el.classList.add('active');
    const titles = { orders:'<em>Orders</em>', menu:'Menu <em>Items</em>' };
    document.getElementById('topbarTitle').innerHTML = titles[page];
    if (page === 'menu') loadMenuAdmin();
    if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  // ── ORDERS ───────────────────────────────────────────
  async function loadOrders() {
    try {
      allOrders = await sb('orders?select=*&order=created_at.desc');
      renderOrders();
      updateStats();
    } catch(e) {
      console.error('Load orders error:', e);
    }
  }

  function renderOrders() {
    const list = document.getElementById('ordersList');
    let filtered = currentFilter === 'all'
      ? allOrders
      : allOrders.filter(o => o.status === currentFilter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div class="ei">📋</div><p>No orders${currentFilter !== 'all' ? ' with status "'+currentFilter+'"' : ''} yet.</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(order => orderCardHTML(order)).join('');

    // Update new badge
    const newCount = allOrders.filter(o => o.status === 'new').length;
    const badge = document.getElementById('newOrdersBadge');
    if (newCount > 0) { badge.textContent = newCount; badge.style.display = 'inline-block'; }
    else badge.style.display = 'none';
  }

  function orderCardHTML(o) {
    const items  = Array.isArray(o.items) ? o.items : JSON.parse(o.items || '[]');
    const time   = new Date(o.created_at).toLocaleString('en-GB', { timeZone:'Asia/Bangkok', hour12:false, day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    const status = o.status || 'new';

    const statusLabels = { new:'🔵 New', preparing:'🟡 Preparing', delivered:'🟢 Delivered', paid:'✅ Paid' };
    const statusClass  = { new:'status-new', preparing:'status-preparing', delivered:'status-delivered', paid:'status-paid' };

    const itemsHTML = items.map(i =>
      `<div class="order-item-row">
        <span>${i.emoji || '🍽️'}</span>
        <span class="order-item-name">${i.name}</span>
        <span class="order-item-qty">× ${i.qty}</span>
        <span class="order-item-price">${i.price * i.qty} THB</span>
      </div>`
    ).join('');

    const notesHTML = o.notes ? `<div class="order-notes">📝 ${o.notes}</div>` : '';
    const notesBadge = o.notes ? `<span class="order-notes-badge">📝 Note</span>` : '';

    // Action buttons based on status
    let actionsHTML = '';
    if (status === 'new') {
      actionsHTML = `
        <button class="action-btn btn-preparing" onclick="updateStatus('${o.id}','preparing')">🟡 Preparing</button>
        <button class="action-btn btn-delete" onclick="deleteOrder('${o.id}')">🗑</button>`;
    } else if (status === 'preparing') {
      actionsHTML = `
        <button class="action-btn btn-delivered" onclick="updateStatus('${o.id}','delivered')">🟢 Delivered</button>
        <button class="action-btn btn-delete" onclick="deleteOrder('${o.id}')">🗑</button>`;
    } else if (status === 'delivered') {
      actionsHTML = `
        <button class="action-btn btn-paid" onclick="updateStatus('${o.id}','paid')">✅ Mark as Paid</button>
        <button class="action-btn btn-delete" onclick="deleteOrder('${o.id}')">🗑</button>`;
    } else {
      actionsHTML = `<button class="action-btn btn-delete" onclick="deleteOrder('${o.id}')">🗑 Remove</button>`;
    }

    return `
      <div class="order-card" id="order-${o.id}">
        <div class="order-card-head">
          <div class="order-room">🛏 ${o.room_number}</div>
          <div class="order-meta">
            <div class="order-time">${time}</div>
            <div class="order-total">${o.total} THB</div>
          </div>
          ${notesBadge}
          <span class="status-badge ${statusClass[status]}">${statusLabels[status]}</span>
        </div>
        <div class="order-items-list">${itemsHTML}</div>
        ${notesHTML}
        <div class="order-actions">${actionsHTML}</div>
      </div>`;
  }

  async function updateStatus(id, status) {
    try {
      await sb(`orders?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({ status }) });
      const order = allOrders.find(o => o.id === id);
      if (order) order.status = status;
      renderOrders();
      updateStats();
      showToast(`✅ Status updated to "${status}"`);
    } catch(e) {
      showToast('⚠️ Error updating status');
      console.error(e);
    }
  }

  async function deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try {
      await sb(`orders?id=eq.${id}`, { method:'DELETE', headers:{ 'Prefer':'' } });
      allOrders = allOrders.filter(o => o.id !== id);
      renderOrders();
      updateStats();
      showToast('🗑 Order deleted');
    } catch(e) {
      showToast('⚠️ Error deleting order');
    }
  }

  function filterOrders(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderOrders();
  }

  function updateStats() {
    const today = new Date().toLocaleDateString('en-CA', { timeZone:'Asia/Bangkok' });
    const todayOrders = allOrders.filter(o => o.created_at.startsWith(today));
    document.getElementById('stat-new').textContent       = allOrders.filter(o => o.status==='new').length;
    document.getElementById('stat-preparing').textContent = allOrders.filter(o => o.status==='preparing').length;
    document.getElementById('stat-delivered').textContent = todayOrders.filter(o => ['delivered','paid'].includes(o.status)).length;
    document.getElementById('stat-revenue').textContent   = todayOrders.filter(o => o.status==='paid').reduce((s,o) => s+o.total, 0);
  }

  // ── MENU ADMIN ───────────────────────────────────────
  async function loadMenuAdmin() {
    const el = document.getElementById('menuContent');
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading…</p></div>';
    try {
      allMenu = await sb('menu_items?select=*&order=category.asc,sort_order.asc');
      renderMenuAdmin();
    } catch(e) {
      el.innerHTML = '<div class="empty-state"><p>⚠️ Could not load menu.</p></div>';
    }
  }

  function renderMenuAdmin() {
    const grouped = {};
    allMenu.forEach(item => {
      if (!grouped[item.category]) grouped[item.category] = [];
      grouped[item.category].push(item);
    });

    const html = Object.entries(CATEGORIES).map(([cat, label]) => {
      const items = grouped[cat] || [];
      const itemsHTML = items.map(item => `
        <div class="menu-item-row ${item.active ? '' : 'inactive'}" id="mi-${item.id}">
          <div class="mi-emoji">${item.emoji}</div>
          <div class="mi-info">
            <div class="mi-name">${item.name}</div>
            <div class="mi-desc">${item.description || ''}</div>
          </div>
          <div class="mi-price">${item.price} THB</div>
          <div class="mi-actions">
            <button class="mi-btn mi-edit" onclick="openItemModal('${item.id}')" title="Edit">✏️</button>
            <button class="mi-btn mi-toggle" onclick="toggleItem('${item.id}',${item.active})" title="${item.active ? 'Disable' : 'Enable'}">${item.active ? '👁' : '🚫'}</button>
            <button class="mi-btn mi-del" onclick="deleteItem('${item.id}')" title="Delete">🗑</button>
          </div>
        </div>`
      ).join('');

      return `
        <div class="menu-cat-section">
          <div class="menu-cat-title">${CAT_EMOJI[cat]} ${label}</div>
          <div class="menu-items-grid">${itemsHTML || '<p style="font-size:13px;color:var(--text-soft);padding:8px 0">No items in this category.</p>'}</div>
        </div>`;
    }).join('');

    document.getElementById('menuContent').innerHTML = html;
  }

  // ── ITEM MODAL ───────────────────────────────────────
  function openItemModal(id = null) {
    editingItemId = id;
    document.getElementById('modalTitle').textContent = id ? 'Edit Item' : 'Add Item';

    if (id) {
      const item = allMenu.find(i => i.id === id);
      if (item) {
        document.getElementById('fCategory').value = item.category;
        document.getElementById('fEmoji').value    = item.emoji;
        document.getElementById('fPrice').value    = item.price;
        document.getElementById('fName').value     = item.name;
        document.getElementById('fDesc').value     = item.description || '';
        document.getElementById('fSort').value     = item.sort_order || 0;
      }
    } else {
      document.getElementById('fCategory').value = 'breakfast';
      document.getElementById('fEmoji').value    = '';
      document.getElementById('fPrice').value    = '';
      document.getElementById('fName').value     = '';
      document.getElementById('fDesc').value     = '';
      document.getElementById('fSort').value     = '0';
    }
    document.getElementById('itemModal').classList.add('open');
  }

  function closeItemModal() {
    document.getElementById('itemModal').classList.remove('open');
    editingItemId = null;
  }

  async function saveItem() {
    const data = {
      category:    document.getElementById('fCategory').value,
      emoji:       document.getElementById('fEmoji').value || '🍽️',
      price:       parseInt(document.getElementById('fPrice').value) || 0,
      name:        document.getElementById('fName').value.trim(),
      description: document.getElementById('fDesc').value.trim(),
      sort_order:  parseInt(document.getElementById('fSort').value) || 0,
    };

    if (!data.name || !data.price) { showToast('⚠️ Name and price are required'); return; }

    try {
      if (editingItemId) {
        await sb(`menu_items?id=eq.${editingItemId}`, { method:'PATCH', body: JSON.stringify(data) });
        showToast('✅ Item updated!');
      } else {
        await sb('menu_items', { method:'POST', body: JSON.stringify({ ...data, active: true }) });
        showToast('✅ Item added!');
      }
      closeItemModal();
      loadMenuAdmin();
    } catch(e) {
      showToast('⚠️ Error saving item');
      console.error(e);
    }
  }

  async function toggleItem(id, currentActive) {
    try {
      await sb(`menu_items?id=eq.${id}`, { method:'PATCH', body: JSON.stringify({ active: !currentActive }) });
      showToast(currentActive ? '🚫 Item disabled' : '✅ Item enabled');
      loadMenuAdmin();
    } catch(e) { showToast('⚠️ Error'); }
  }

  async function deleteItem(id) {
    if (!confirm('Delete this menu item permanently?')) return;
    try {
      await sb(`menu_items?id=eq.${id}`, { method:'DELETE', headers:{ 'Prefer':'' } });
      showToast('🗑 Item deleted');
      loadMenuAdmin();
    } catch(e) { showToast('⚠️ Error deleting item'); }
  }

  // ── TOAST ─────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── CLOCK ─────────────────────────────────────────────
  updateClock();
</script>
</body>
</html>
