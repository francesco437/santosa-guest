<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Santosa – Food & Drinks</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans 3',sans-serif;background:linear-gradient(170deg,#3aacbe 0%,#4bbfcc 50%,#5dcfda 100%);min-height:100vh;color:white;overflow-x:hidden;}
.wavebg{position:fixed;bottom:0;left:0;width:100%;height:260px;pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;max-width:480px;margin:0 auto;}
.header{padding:28px 20px 18px;text-align:center;}
.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.logo{font-family:'Source Sans 3',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.5px;}
.room{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.85);margin-top:5px;font-weight:600;}
.cartbtn{background:rgba(255,255,255,0.22);border:1px solid rgba(255,255,255,0.4);border-radius:50px;padding:10px 18px;color:white;font-size:13px;font-weight:600;font-family:'Source Sans 3',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;}
.cartbadge{background:white;color:#2e96aa;border-radius:50px;padding:1px 8px;font-size:11px;font-weight:800;display:none;}
.hlabel{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.75);margin-bottom:8px;font-weight:600;text-align:center;}
.htitle{font-family:'Source Sans 3',sans-serif;font-size:36px;font-weight:800;line-height:1.1;margin-bottom:14px;white-space:nowrap;}
.htitle em{font-style:italic;}
.timepill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);border-radius:50px;padding:8px 16px;font-size:13px;font-weight:500;margin:0 auto;}
.tabs{position:sticky;top:0;z-index:20;background:rgba(55,168,183,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.2);}
.tabsrow{display:flex;overflow-x:auto;scrollbar-width:none;}
.tabsrow::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:14px 20px;background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,0.6);font-weight:700;font-size:14px;font-family:'Source Sans 3',sans-serif;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;letter-spacing:0.3px;}
.tab.on{color:white;border-bottom-color:white;}
.menuwrap{padding:24px 16px 120px;}
.sectitle{font-family:'Source Sans 3',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;}
.secsub{font-size:12px;color:rgba(255,255,255,0.8);margin-bottom:18px;font-weight:500;}
.cards{display:flex;flex-direction:column;gap:16px;}
.card{background:rgba(0,80,90,0.35);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);}
.imgwrap{position:relative;height:185px;overflow:hidden;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;}
.imgwrap img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;}
.imgoverlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(40,140,158,0.72) 100%);}
.pricebadge{position:absolute;bottom:12px;left:14px;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.35);border-radius:50px;padding:3px 12px;font-size:13px;font-weight:700;color:white;}
.cardbody{padding:14px 15px 15px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.cardinfo{flex:1;}
.cardname{font-size:16px;font-weight:700;color:white;margin-bottom:5px;}
.carddesc{font-size:13px;color:rgba(255,255,255,0.9);line-height:1.5;}
.ctrls{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.qbtn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.45);background:rgba(255,255,255,0.12);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qnum{font-size:15px;font-weight:700;min-width:18px;text-align:center;}
.addbtn{width:36px;height:36px;border-radius:50%;border:none;background:white;color:#2e96aa;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,0.12);line-height:1;}
.cartbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;z-index:40;display:none;}
.cartbarbtn{width:100%;padding:15px 22px;background:rgba(255,255,255,0.95);color:#2e96aa;border:none;border-radius:16px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:0 6px 24px rgba(0,0,0,0.14);}
.barbadge{background:#3aacbe;color:white;border-radius:50px;padding:2px 10px;font-size:13px;}
.overlay{position:fixed;inset:0;z-index:50;display:none;}
.overlay.on{display:block;}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.32);backdrop-filter:blur(6px);}
.sheet{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(170deg,#2e96aa,#3aacbe);border-radius:26px 26px 0 0;padding:26px 20px 40px;max-height:82vh;overflow-y:auto;}
.handle{width:34px;height:4px;background:rgba(255,255,255,0.28);border-radius:2px;margin:0 auto 20px;}
.sheethdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.sheettitle{font-family:'Source Sans 3',sans-serif;font-size:22px;font-weight:800;color:white;}
.closebtn{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.25);border-radius:50%;width:32px;height:32px;cursor:pointer;color:white;font-size:18px;display:flex;align-items:center;justify-content:center;}
.citem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.13);}
.citem img{width:52px;height:52px;border-radius:12px;object-fit:cover;flex-shrink:0;}
.cph{width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.15);flex-shrink:0;}
.cname{font-size:14px;font-weight:600;color:white;}
.cprice{font-size:13px;color:rgba(255,255,255,0.72);margin-top:2px;}
.cctrls{display:flex;align-items:center;gap:7px;margin-left:auto;flex-shrink:0;}
.cbtn{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:white;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cbtnp{width:26px;height:26px;border-radius:50%;border:none;background:white;color:#2e96aa;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cqnum{font-size:14px;font-weight:700;color:white;min-width:14px;text-align:center;}
.noteslbl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:1.5px;text-transform:uppercase;margin:16px 0 8px;}
.notestxt{width:100%;padding:12px 14px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:12px;color:white;font-size:13px;font-family:'Source Sans 3',sans-serif;resize:none;height:72px;outline:none;}
.notestxt::placeholder{color:rgba(255,255,255,0.4);}
.totrow{display:flex;justify-content:space-between;padding:14px 0 4px;font-weight:700;font-size:16px;color:white;}
.totsub{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:16px;}
.orderbtn{width:100%;padding:15px;background:rgba(255,255,255,0.95);color:#2e96aa;border:none;border-radius:14px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.successmsg{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:14px;padding:18px;text-align:center;color:white;font-weight:600;font-size:15px;display:none;}
.loading{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.7);font-size:14px;}
</style>
</head>
<body>

<svg class="wavebg" viewBox="0 0 480 260" preserveAspectRatio="none">
  <path d="M0,130 C80,90 160,170 240,130 C320,90 400,150 480,120 L480,260 L0,260 Z" fill="white" opacity="0.08"/>
  <path d="M0,160 C100,130 200,190 300,160 C380,138 430,165 480,155 L480,260 L0,260 Z" fill="white" opacity="0.06"/>
  <path d="M0,195 C120,168 230,215 340,190 C400,174 445,195 480,188 L480,260 L0,260 Z" fill="white" opacity="0.05"/>
</svg>

<div class="page">
  <div class="header">
    <div class="htop">
      <div>
        <div class="logo">Santosa</div>
        <div class="room" id="roomLabel">Room —</div>
      </div>
      <button class="cartbtn" onclick="openCart()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
        Cart <span class="cartbadge" id="cartBadge">0</span>
      </button>
    </div>
    <div class="hlabel">In-Room Service</div>
    <div class="htitle">Food & <span style="font-style:italic">Drinks</span></div>
    <div class="timepill">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Available 11:00 – 20:00
    </div>
  </div>

  <div class="tabs"><div class="tabsrow" id="tabsEl"></div></div>

  <div class="menuwrap">
    <div class="sectitle" id="secTitle">Menu</div>
    <div class="secsub">Served daily · Charged to your room at check-out</div>
    <div id="menuEl"><div class="loading">Loading menu...</div></div>
  </div>
</div>

<div class="cartbar" id="cartBar">
  <button class="cartbarbtn" onclick="openCart()">
    <span class="barbadge" id="barBadge">0 items</span>
    <span>View Cart</span>
    <span id="barTotal">0 THB</span>
  </button>
</div>

<div class="overlay" id="overlay">
  <div class="backdrop" onclick="closeCart()"></div>
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheethdr">
      <div class="sheettitle">Your Order</div>
      <button class="closebtn" onclick="closeCart()">×</button>
    </div>
    <div id="sheetItems"></div>
    <div class="noteslbl">Notes</div>
    <textarea class="notestxt" id="notesEl" placeholder="Allergies, preferences..."></textarea>
    <div class="totrow"><span>Total</span><span id="sheetTotal">0 THB</span></div>
    <div class="totsub">Charged to your room at check-out</div>
    <button class="orderbtn" id="orderBtn" onclick="placeOrder()">Place Order · Room <span id="roomNum">—</span></button>
    <div class="successmsg" id="successEl"><div>✓ Order sent! We'll deliver to your room shortly.</div><a id="waLink" href="#" target="_blank" style="display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:10px 20px;background:#25D366;color:white;border-radius:50px;font-size:13px;font-weight:700;text-decoration:none;">📲 Notify via WhatsApp</a></div>
  </div>
</div>

<script>
var SB = 'https://zycptgrxnvbqsbngfuqi.supabase.co';
var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';

var ICONS = {
  breakfast: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>',
  daymenu:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>',
  healthy:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  drinks:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l1 10H7L8 2z"/><path d="M7 12c0 4 2 8 5 8s5-4 5-8"/><line x1="6" y1="6" x2="18" y2="6"/></svg>'
};
var LABELS = {breakfast:'Breakfast', daymenu:'Day Menu', healthy:'Healthy', drinks:'Drinks'};

var cart = {};
var menuData = {};
var activeTab = 'breakfast';
var room = (new URLSearchParams(location.search).get('room')) || '311';
document.getElementById('roomLabel').textContent = 'Room ' + room;
document.getElementById('roomNum').textContent = room;

function sbq(path, opts) {
  opts = opts || {};
  var headers = {
    'apikey': SK,
    'Authorization': 'Bearer ' + SK,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
  return fetch(SB + '/rest/v1/' + path, Object.assign({headers: headers}, opts))
    .then(function(r) { return r.text().then(function(t) { if (!r.ok) throw new Error(t); return t ? JSON.parse(t) : null; }); });
}

function loadMenu() {
  sbq('menu_items?select=*&active=eq.true&order=category,sort_order')
    .then(function(items) {
      menuData = {};
      (items || []).forEach(function(item) {
        var c = item.category || 'other';
        if (!menuData[c]) menuData[c] = [];
        menuData[c].push(item);
      });
      var cats = Object.keys(menuData);
      if (!cats.length) { document.getElementById('menuEl').innerHTML = '<div class="loading">Menu not available.</div>'; return; }
      activeTab = cats[0];
      renderTabs();
      renderMenu();
    })
    .catch(function(e) {
      console.error(e);
      document.getElementById('menuEl').innerHTML = '<div class="loading">Could not load menu. Please try again.</div>';
    });
}

function renderTabs() {
  var cats = Object.keys(menuData);
  document.getElementById('tabsEl').innerHTML = cats.map(function(c) {
    return '<button class="tab ' + (c === activeTab ? 'on' : '') + '" onclick="switchTab(\'' + c + '\')">'
      + (ICONS[c] || ICONS.daymenu) + ' '
      + (LABELS[c] || c) + '</button>';
  }).join('');
}

function renderMenu() {
  var items = menuData[activeTab] || [];
  document.getElementById('secTitle').textContent = LABELS[activeTab] || activeTab;
  if (!items.length) { document.getElementById('menuEl').innerHTML = '<div class="loading">No items.</div>'; return; }

  var html = '<div class="cards">';
  items.forEach(function(item) {
    var safeId = item.id;
    var ctrlHtml = cart[safeId] > 0
      ? '<button class="qbtn" onclick="rem(\'' + safeId + '\')">−</button><span class="qnum">' + cart[safeId] + '</span><button class="addbtn" onclick="add(\'' + safeId + '\')">+</button>'
      : '<button class="addbtn" onclick="add(\'' + safeId + '\')">+</button>';

    html += '<div class="card">'
      + '<div class="imgwrap">'
      + (item.image_url ? '<img src="' + item.image_url + '" alt="' + item.name + '" loading="lazy">' : '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>')
      + '<div class="imgoverlay"></div>'
      + '<div class="pricebadge">' + item.price + ' THB</div>'
      + '</div>'
      + '<div class="cardbody">'
      + '<div class="cardinfo"><div class="cardname">' + item.name + '</div><div class="carddesc">' + (item.description || '') + '</div></div>'
      + '<div class="ctrls" id="ctrl-' + safeId + '">' + ctrlHtml + '</div>'
      + '</div></div>';
  });
  html += '</div>';
  document.getElementById('menuEl').innerHTML = html;
}

function switchTab(c) { activeTab = c; renderTabs(); renderMenu(); }

function add(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCtrl(id);
  updateBar();
}

function rem(id) {
  if (!cart[id]) return;
  cart[id]--;
  if (cart[id] <= 0) delete cart[id];
  updateCtrl(id);
  updateBar();
  var ov = document.getElementById('overlay');
  if (ov.classList.contains('on')) renderSheet();
}

function updateCtrl(id) {
  var el = document.getElementById('ctrl-' + id);
  if (!el) return;
  var q = cart[id] || 0;
  el.innerHTML = q === 0
    ? '<button class="addbtn" onclick="add(\'' + id + '\')">+</button>'
    : '<button class="qbtn" onclick="rem(\'' + id + '\')">−</button><span class="qnum">' + q + '</span><button class="addbtn" onclick="add(\'' + id + '\')">+</button>';
}

function getTotal() {
  var t = 0;
  Object.keys(cart).forEach(function(id) {
    var item = null;
    Object.keys(menuData).forEach(function(c) { menuData[c].forEach(function(i) { if (i.id === id) item = i; }); });
    if (item) t += item.price * cart[id];
  });
  return t;
}

function getCount() {
  return Object.values(cart).reduce(function(s, q) { return s + q; }, 0);
}

function updateBar() {
  var n = getCount(), t = getTotal();
  var badge = document.getElementById('cartBadge');
  badge.textContent = n;
  badge.style.display = n > 0 ? 'inline' : 'none';
  var bar = document.getElementById('cartBar');
  bar.style.display = n > 0 ? 'block' : 'none';
  document.getElementById('barBadge').textContent = n + (n === 1 ? ' item' : ' items');
  document.getElementById('barTotal').textContent = t.toLocaleString() + ' THB';
}

function openCart() { document.getElementById('overlay').classList.add('on'); renderSheet(); }
function closeCart() { document.getElementById('overlay').classList.remove('on'); }

function renderSheet() {
  var ci = [];
  Object.keys(cart).forEach(function(id) {
    var item = null;
    Object.keys(menuData).forEach(function(c) { menuData[c].forEach(function(i) { if (i.id === id) item = i; }); });
    if (item) ci.push({item: item, qty: cart[id]});
  });

  var el = document.getElementById('sheetItems');
  if (!ci.length) {
    el.innerHTML = '<div style="text-align:center;padding:28px 0;color:rgba(255,255,255,0.5)">Your cart is empty</div>';
    document.getElementById('orderBtn').style.display = 'none';
    return;
  }
  document.getElementById('orderBtn').style.display = 'block';

  var html = '';
  ci.forEach(function(x) {
    html += '<div class="citem">'
      + (x.item.image_url ? '<img src="' + x.item.image_url + '" alt="' + x.item.name + '">' : '<div class="cph"></div>')
      + '<div style="flex:1"><div class="cname">' + x.item.name + '</div><div class="cprice">' + x.item.price + ' THB</div></div>'
      + '<div class="cctrls">'
      + '<button class="cbtn" onclick="rem(\'' + x.item.id + '\');renderSheet()">−</button>'
      + '<span class="cqnum">' + x.qty + '</span>'
      + '<button class="cbtnp" onclick="add(\'' + x.item.id + '\');renderSheet()">+</button>'
      + '</div></div>';
  });
  el.innerHTML = html;
  document.getElementById('sheetTotal').textContent = getTotal().toLocaleString() + ' THB';
}

function placeOrder() {
  var ci = [];
  Object.keys(cart).forEach(function(id) {
    var item = null;
    Object.keys(menuData).forEach(function(c) { menuData[c].forEach(function(i) { if (i.id === id) item = i; }); });
    if (item) ci.push({item: item, qty: cart[id]});
  });
  if (!ci.length) return;

  var btn = document.getElementById('orderBtn');
  btn.textContent = 'Sending...';
  btn.disabled = true;

  var itemsJson = ci.map(function(x) { return {id: x.item.id, name: x.item.name, price: x.item.price, qty: x.qty}; });
  var notes = document.getElementById('notesEl').value;

  var total = getTotal();
  sbq('orders', {
    method: 'POST',
    body: JSON.stringify({
      room_number: room,
      items: itemsJson,
      total: total,
      notes: notes || null,
      status: 'new'
    })
  }).then(function() {
    // WhatsApp notification
    var waLines = ci.map(function(x) { return x.qty + 'x ' + x.item.name + ' (' + (x.item.price * x.qty) + ' THB)'; });
    var msgText = '🛎 *New Food Order*\n' + '🛏 Room: *' + room + '*\n' + '-----------\n' + waLines.join('\n') + '\n' + '-----------\n' + 'Total: *' + total + ' THB*' + (notes ? '\nNote: ' + notes : '');
    var waUrl = 'https://wa.me/393465309386?text=' + encodeURIComponent(msgText);
    document.getElementById('waLink').href = waUrl;
    setTimeout(function() { window.location.href = waUrl; }, 400);
    cart = {};
    updateBar();
    renderMenu();
    btn.style.display = 'none';
    document.getElementById('successEl').style.display = 'block';
  }).catch(function(e) {
    console.error(e);
    btn.textContent = 'Place Order · Room ' + room;
    btn.disabled = false;
    alert('Could not send order. Please call reception.');
  });
}

loadMenu();
</script>
</body>
</html>
