<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Santosa – Food & Drinks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(170deg, #3aacbe 0%, #4bbfcc 50%, #5dcfda 100%);
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
}
.wave-bg { position:fixed; bottom:0; left:0; width:100%; height:260px; pointer-events:none; z-index:0; }
.page { position:relative; z-index:1; max-width:480px; margin:0 auto; }
.header { padding:36px 20px 28px; }
.header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
.logo-name { font-family:'DM Serif Display',serif; font-size:22px; color:white; line-height:1; }
.logo-room { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.65); margin-top:4px; }
.cart-btn { background:rgba(255,255,255,0.22); border:1px solid rgba(255,255,255,0.4); border-radius:50px; padding:10px 18px; color:white; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; display:flex; align-items:center; gap:8px; }
.cart-count { background:white; color:#2e96aa; border-radius:50px; padding:1px 8px; font-size:11px; font-weight:800; display:none; }
.header-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.65); margin-bottom:8px; }
.header-title { font-family:'DM Serif Display',serif; font-size:42px; line-height:1.05; margin-bottom:20px; }
.header-title em { font-style:italic; }
.time-pill { display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.3); border-radius:50px; padding:8px 16px; font-size:13px; font-weight:500; }
.tabs { position:sticky; top:0; z-index:20; background:rgba(55,168,183,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.2); }
.tabs-inner { display:flex; overflow-x:auto; scrollbar-width:none; }
.tabs-inner::-webkit-scrollbar { display:none; }
.tab-btn { flex:0 0 auto; padding:14px 20px; background:none; border:none; border-bottom:2.5px solid transparent; color:rgba(255,255,255,0.5); font-weight:600; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; display:flex; align-items:center; gap:7px; white-space:nowrap; transition:all .15s; }
.tab-btn.active { color:white; border-bottom-color:white; }
.menu { padding:24px 16px 120px; }
.section-title { font-family:'DM Serif Display',serif; font-size:28px; color:white; margin-bottom:4px; font-style:italic; }
.section-sub { font-size:12px; color:rgba(255,255,255,0.65); margin-bottom:22px; }
.cards { display:flex; flex-direction:column; gap:16px; }
.card { background:rgba(255,255,255,0.16); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,0.28); }
.card-img-wrap { position:relative; height:185px; overflow:hidden; background:rgba(255,255,255,0.1); }
.card-img { width:100%; height:100%; object-fit:cover; display:block; }
.card-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.card-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 40%, rgba(40,140,158,0.72) 100%); }
.card-price { position:absolute; bottom:12px; left:14px; background:rgba(255,255,255,0.2); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.35); border-radius:50px; padding:3px 12px; font-size:13px; font-weight:700; color:white; }
.card-body { padding:14px 15px 15px; display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
.card-info { flex:1; }
.card-name { font-size:15px; font-weight:700; color:white; margin-bottom:5px; }
.card-desc { font-size:12px; color:rgba(255,255,255,0.7); line-height:1.6; }
.card-controls { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.qty-btn { width:30px; height:30px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.45); background:rgba(255,255,255,0.12); color:white; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.qty-num { font-size:15px; font-weight:700; min-width:18px; text-align:center; }
.add-btn { width:36px; height:36px; border-radius:50%; border:none; background:white; color:#2e96aa; font-size:22px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 12px rgba(0,0,0,0.12); line-height:1; }
.cart-bar { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:448px; z-index:40; display:none; }
.cart-bar-btn { width:100%; padding:15px 22px; background:rgba(255,255,255,0.95); color:#2e96aa; border:none; border-radius:16px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:space-between; box-shadow:0 6px 24px rgba(0,0,0,0.14); }
.cart-bar-badge { background:#3aacbe; color:white; border-radius:50px; padding:2px 10px; font-size:13px; }
.cart-overlay { position:fixed; inset:0; z-index:50; display:none; }
.cart-overlay.open { display:block; }
.cart-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.32); backdrop-filter:blur(6px); }
.cart-sheet { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(170deg,#2e96aa,#3aacbe); border-radius:26px 26px 0 0; padding:26px 20px 40px; max-height:82vh; overflow-y:auto; }
.cart-handle { width:34px; height:4px; background:rgba(255,255,255,0.28); border-radius:2px; margin:0 auto 20px; }
.cart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.cart-title { font-family:'DM Serif Display',serif; font-size:22px; color:white; }
.cart-close { background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.25); border-radius:50%; width:32px; height:32px; cursor:pointer; color:white; font-size:18px; display:flex; align-items:center; justify-content:center; }
.cart-item { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid rgba(255,255,255,0.13); }
.cart-item img { width:52px; height:52px; border-radius:12px; object-fit:cover; flex-shrink:0; }
.cart-item-ph { width:52px; height:52px; border-radius:12px; background:rgba(255,255,255,0.15); flex-shrink:0; }
.cart-item-name { font-size:14px; font-weight:600; color:white; }
.cart-item-price { font-size:13px; color:rgba(255,255,255,0.72); margin-top:2px; }
.cart-item-ctrls { display:flex; align-items:center; gap:7px; margin-left:auto; flex-shrink:0; }
.c-btn { width:26px; height:26px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.1); color:white; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.c-btn.plus { background:white; color:#2e96aa; border:none; font-weight:700; }
.c-num { font-size:14px; font-weight:700; color:white; min-width:14px; text-align:center; }
.notes-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.55); letter-spacing:1.5px; text-transform:uppercase; margin:16px 0 8px; }
.notes-area { width:100%; padding:12px 14px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25); border-radius:12px; color:white; font-size:13px; font-family:'DM Sans',sans-serif; resize:none; height:72px; outline:none; }
.notes-area::placeholder { color:rgba(255,255,255,0.4); }
.cart-total-row { display:flex; justify-content:space-between; padding:14px 0 4px; font-weight:700; font-size:16px; color:white; }
.cart-sub { font-size:11px; color:rgba(255,255,255,0.45); margin-bottom:16px; }
.order-btn { width:100%; padding:15px; background:rgba(255,255,255,0.95); color:#2e96aa; border:none; border-radius:14px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; }
.order-success { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:14px; padding:18px; text-align:center; color:white; font-weight:600; font-size:15px; display:none; }
.loading { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.7); font-size:14px; }
</style>
</head>
<body>

<svg class="wave-bg" viewBox="0 0 480 260" preserveAspectRatio="none">
  <path d="M0,130 C80,90 160,170 240,130 C320,90 400,150 480,120 L480,260 L0,260 Z" fill="white" opacity="0.08"/>
  <path d="M0,160 C100,130 200,190 300,160 C380,138 430,165 480,155 L480,260 L0,260 Z" fill="white" opacity="0.06"/>
  <path d="M0,195 C120,168 230,215 340,190 C400,174 445,195 480,188 L480,260 L0,260 Z" fill="white" opacity="0.05"/>
</svg>

<div class="page">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-name">Santosa</div>
        <div class="logo-room" id="roomLabel">Room —</div>
      </div>
      <button class="cart-btn" onclick="openCart()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
        Cart <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
    <div class="header-label">In-Room Service</div>
    <div class="header-title">Food &<br><em>Drinks</em></div>
    <div class="time-pill">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Available 11:00 – 20:00
    </div>
  </div>

  <div class="tabs"><div class="tabs-inner" id="tabsEl"></div></div>

  <div class="menu">
    <div class="section-title" id="sectionTitle">Menu</div>
    <div class="section-sub">Served daily · Charged to your room at check-out</div>
    <div id="menuEl"><div class="loading">Loading menu...</div></div>
  </div>
</div>

<div class="cart-bar" id="cartBar">
  <button class="cart-bar-btn" onclick="openCart()">
    <span class="cart-bar-badge" id="barBadge">0</span>
    <span>View Cart</span>
    <span id="barTotal">0 THB</span>
  </button>
</div>

<div class="cart-overlay" id="cartOverlay">
  <div class="cart-backdrop" onclick="closeCart()"></div>
  <div class="cart-sheet">
    <div class="cart-handle"></div>
    <div class="cart-header">
      <div class="cart-title">Your Order</div>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>
    <div id="cartItemsEl"></div>
    <div class="notes-label">Notes</div>
    <textarea class="notes-area" id="notesEl" placeholder="Allergies, preferences..."></textarea>
    <div class="cart-total-row"><span>Total</span><span id="cartTotalEl">0 THB</span></div>
    <div class="cart-sub">Charged to your room at check-out</div>
    <button class="order-btn" id="orderBtn" onclick="placeOrder()">Place Order · Room <span id="roomNum">—</span></button>
    <div class="order-success" id="successEl">✓ Order sent! We'll deliver to your room shortly.</div>
  </div>
</div>

<script>
const SB='https://zycptgrxnvbqsbngfuqi.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';

const ICONS = {
  breakfast:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>`,
  day_menu:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>`,
  healthy:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  drinks:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l1 10H7L8 2z"/><path d="M7 12c0 4 2 8 5 8s5-4 5-8"/><line x1="6" y1="6" x2="18" y2="6"/></svg>`,
};
const LABELS = {breakfast:'Breakfast',day_menu:'Day Menu',healthy:'Healthy',drinks:'Drinks'};

let cart={}, menuData={}, activeTab='breakfast';
const room = new URLSearchParams(location.search).get('room')||'—';
document.getElementById('roomLabel').textContent='Room '+room;
document.getElementById('roomNum').textContent=room;

async function sbq(p,o={}){
  const h={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};
  const r=await fetch(SB+'/rest/v1/'+p,{headers:h,...o});
  const t=await r.text();
  if(!r.ok) throw new Error(r.status+': '+t);
  return t?JSON.parse(t):null;
}

async function loadMenu(){
  try {
    const items=await sbq('menu_items?select=*&available=eq.true&order=category,sort_order');
    menuData={};
    (items||[]).forEach(i=>{
      const c=i.category||'other';
      if(!menuData[c]) menuData[c]=[];
      menuData[c].push(i);
    });
    // fallback if empty
    if(!Object.keys(menuData).length) throw new Error('empty');
    activeTab=Object.keys(menuData)[0];
    renderTabs(); renderMenu();
  } catch(e) {
    document.getElementById('menuEl').innerHTML='<div class="loading">Could not load menu.</div>';
  }
}

function renderTabs(){
  document.getElementById('tabsEl').innerHTML=Object.keys(menuData).map(c=>`
    <button class="tab-btn ${c===activeTab?'active':''}" onclick="switchTab('${c}')">
      ${ICONS[c]||ICONS.day_menu}
      ${LABELS[c]||c.replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase())}
    </button>`).join('');
}

function renderMenu(){
  const items=menuData[activeTab]||[];
  document.getElementById('sectionTitle').textContent=LABELS[activeTab]||activeTab;
  if(!items.length){document.getElementById('menuEl').innerHTML='<div class="loading">No items.</div>';return;}
  document.getElementById('menuEl').innerHTML='<div class="cards">'+items.map(item=>`
    <div class="card">
      <div class="card-img-wrap">
        ${item.image_url?`<img class="card-img" src="${item.image_url}" alt="${item.name}" loading="lazy">`
        :`<div class="card-img-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`}
        <div class="card-overlay"></div>
        <div class="card-price">${item.price} THB</div>
      </div>
      <div class="card-body">
        <div class="card-info">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.description||''}</div>
        </div>
        <div class="card-controls" id="ctrl-${item.id}">
          <button class="add-btn" onclick="add(${item.id})">+</button>
        </div>
      </div>
    </div>`).join('')+'</div>';
  Object.keys(cart).forEach(id=>updateCtrl(parseInt(id)));
}

function switchTab(c){activeTab=c;renderTabs();renderMenu();}

function add(id){cart[id]=(cart[id]||0)+1;updateCtrl(id);updateBar();}
function rem(id){if(!cart[id])return;cart[id]--;if(cart[id]<=0)delete cart[id];updateCtrl(id);updateBar();if(document.getElementById('cartOverlay').classList.contains('open'))renderSheet();}

function updateCtrl(id){
  const el=document.getElementById('ctrl-'+id);
  if(!el)return;
  const q=cart[id]||0;
  el.innerHTML=q===0
    ?`<button class="add-btn" onclick="add(${id})">+</button>`
    :`<button class="qty-btn" onclick="rem(${id})">−</button><span class="qty-num">${q}</span><button class="add-btn" onclick="add(${id})">+</button>`;
}

function getTotal(){return Object.entries(cart).reduce((s,[id,q])=>{const i=Object.values(menuData).flat().find(x=>x.id==id);return s+(i?.price||0)*q;},0);}
function getCount(){return Object.values(cart).reduce((s,q)=>s+q,0);}

function updateBar(){
  const n=getCount(),t=getTotal();
  const cc=document.getElementById('cartCount');
  cc.textContent=n; cc.style.display=n>0?'inline':'none';
  const bar=document.getElementById('cartBar');
  bar.style.display=n>0?'block':'none';
  document.getElementById('barBadge').textContent=n+(n===1?' item':' items');
  document.getElementById('barTotal').textContent=t.toLocaleString()+' THB';
}

function openCart(){document.getElementById('cartOverlay').classList.add('open');renderSheet();}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');}

function renderSheet(){
  const ci=Object.entries(cart).map(([id,qty])=>({item:Object.values(menuData).flat().find(i=>i.id==id),qty})).filter(x=>x.item);
  const el=document.getElementById('cartItemsEl');
  if(!ci.length){el.innerHTML='<div style="text-align:center;padding:28px 0;color:rgba(255,255,255,0.5)">Your cart is empty</div>';document.getElementById('orderBtn').style.display='none';return;}
  document.getElementById('orderBtn').style.display='block';
  el.innerHTML=ci.map(({item,qty})=>`
    <div class="cart-item">
      ${item.image_url?`<img src="${item.image_url}" alt="${item.name}">`:`<div class="cart-item-ph"></div>`}
      <div style="flex:1"><div class="cart-item-name">${item.name}</div><div class="cart-item-price">${item.price} THB</div></div>
      <div class="cart-item-ctrls">
        <button class="c-btn" onclick="rem(${item.id});renderSheet()">−</button>
        <span class="c-num">${qty}</span>
        <button class="c-btn plus" onclick="add(${item.id});renderSheet()">+</button>
      </div>
    </div>`).join('');
  document.getElementById('cartTotalEl').textContent=getTotal().toLocaleString()+' THB';
}

async function placeOrder(){
  const ci=Object.entries(cart).map(([id,qty])=>({item:Object.values(menuData).flat().find(i=>i.id==id),qty})).filter(x=>x.item);
  if(!ci.length)return;
  const btn=document.getElementById('orderBtn');
  btn.textContent='Sending...'; btn.disabled=true;
  try {
    const detail=ci.map(({item,qty})=>qty+'x '+item.name).join(', ');
    const notes=document.getElementById('notesEl').value;
    await sbq('requests',{method:'POST',body:JSON.stringify({
      room_number:room, service_type:'food',
      request_details:detail+(notes?' | Notes: '+notes:''),
      status:'new', total_amount:getTotal(), source:'guest_menu'
    })});
    cart={}; updateBar(); renderMenu();
    btn.style.display='none';
    document.getElementById('successEl').style.display='block';
  } catch(e) {
    btn.textContent='Place Order · Room '+room; btn.disabled=false;
    alert('Could not send order. Please call reception.');
  }
}

loadMenu();
</script>
</body>
</html>
