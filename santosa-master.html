<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosa — Master Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#3DBFB7;--teal-dark:#2A9E97;--teal-deep:#1A6E6A;
  --teal-light:#B2E8E5;--teal-foam:#EBF9F8;--white:#FFFFFF;
  --bg:#F4FAFA;--text:#0F2E2D;--text-mid:#3A6664;--text-soft:#7AADAB;
  --border:#C8EDED;--sidebar-w:220px;
  --red:#E53935;--orange:#E65100;--green:#2E7D52;--purple:#6C63FF;--gold:#D4A847;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--teal-deep),var(--teal-dark));}
.login-box{background:var(--white);border-radius:24px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(26,110,106,0.3);text-align:center;}
.login-logo{font-family:'DM Serif Display',serif;font-size:30px;color:var(--teal-deep);}
.login-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);margin-bottom:32px;margin-top:4px;}
.login-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--teal-foam);outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px;transition:border-color .15s;}
.login-input:focus{border-color:var(--teal);}
.login-btn{width:100%;padding:14px;background:var(--teal);color:var(--white);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;}
.login-btn:hover{background:var(--teal-dark);}
.login-err{color:var(--red);font-size:13px;margin-top:10px;display:none;}

/* APP */
.app{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--teal-deep);display:flex;flex-direction:column;z-index:50;}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-logo-name{font-family:'DM Serif Display',serif;font-size:20px;color:var(--white);}
.sb-logo-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--teal-light);margin-top:2px;}
.sb-nav{flex:1;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,.07);}
.nav-item.active{color:var(--white);background:rgba(61,191,183,.18);border-left-color:var(--teal);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-badge{background:var(--teal);color:var(--white);border-radius:50px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:auto;}
.sb-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
.sb-role{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.logout-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.45);cursor:pointer;display:flex;align-items:center;gap:6px;}
.logout-btn:hover{color:var(--white);}

.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.topbar-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--teal-deep);}
.topbar-title em{font-style:italic;color:var(--teal-dark);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.5s infinite;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.3);}}
.clock{font-size:12px;color:var(--text-soft);}

.content{padding:24px 28px 80px;flex:1;}
.page{display:none;}
.page.active{display:block;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:14px;padding:18px;border:1px solid var(--border);}
.stat-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);}
.stat-value{font-family:'DM Serif Display',serif;font-size:28px;color:var(--teal-deep);margin-top:4px;}
.stat-sub{font-size:11px;color:var(--text-soft);margin-top:2px;}
.stat-trend{font-size:11px;margin-top:4px;}
.trend-up{color:var(--green);}
.trend-dn{color:var(--red);}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-head h2{font-family:'DM Serif Display',serif;font-size:18px;color:var(--teal-deep);}
.filter-tabs{display:flex;gap:5px;}
.ftab{padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--teal-foam);color:var(--text-soft);transition:all .15s;font-family:'DM Sans',sans-serif;}
.ftab:hover{background:var(--teal-light);color:var(--teal-deep);}
.ftab.active{background:var(--teal);color:var(--white);}

/* ORDER CARDS */
.orders-list{display:flex;flex-direction:column;gap:10px;}
.order-card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s;}
.order-card:hover{box-shadow:0 4px 16px rgba(61,191,183,.1);}
.oc-head{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--teal-foam);}
.oc-room{font-family:'DM Serif Display',serif;font-size:20px;color:var(--teal-deep);min-width:55px;}
.oc-meta{flex:1;}
.oc-service{font-size:12px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px;}
.oc-time{font-size:11px;color:var(--text-soft);margin-top:1px;}
.oc-total{font-size:14px;font-weight:700;color:var(--teal-dark);}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.s-new{background:#E3F2FD;color:#1565C0;}
.s-confirmed{background:#FFF8E1;color:#F57F17;}
.s-completed{background:#E8F5E9;color:#2E7D32;}
.s-paid{background:#E8F5E9;color:#1B5E20;}
.oc-details{padding:10px 16px;font-size:12px;color:var(--text-mid);line-height:1.7;background:var(--bg);}
.oc-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--teal-foam);background:var(--bg);}
.act-btn{flex:1;padding:8px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.btn-confirm{background:#FFF8E1;color:#F57F17;}
.btn-confirm:hover{background:#FFE082;}
.btn-complete{background:#E8F5E9;color:#2E7D32;}
.btn-complete:hover{background:#A5D6A7;}
.btn-paid{background:var(--teal);color:var(--white);}
.btn-paid:hover{background:var(--teal-dark);}
.btn-del{background:#FFEBEE;color:var(--red);max-width:40px;}
.btn-del:hover{background:#FFCDD2;}

/* SERVICE TYPE COLORS */
.type-food{border-left:3px solid var(--teal);}
.type-hotel{border-left:3px solid var(--gold);}
.type-spa{border-left:3px solid var(--purple);}

/* EMPTY */
.empty-state{text-align:center;padding:50px 20px;color:var(--text-soft);}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5;}

/* LOADING */
.loading{text-align:center;padding:50px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── CALENDAR PAGE ── */
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cal-nav-btn:hover{background:var(--teal-foam);border-color:var(--teal);}
.cal-date-label{font-family:'DM Serif Display',serif;font-size:18px;color:var(--teal-deep);}
.cal-view-tabs{display:flex;gap:5px;}

.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:24px;}
.cal-day{background:var(--white);border-radius:12px;border:1px solid var(--border);min-height:120px;padding:10px;}
.cal-day.today{border-color:var(--teal);box-shadow:0 0 0 2px rgba(61,191,183,.2);}
.cal-day-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);margin-bottom:6px;}
.cal-day-num{font-size:18px;font-weight:700;color:var(--text-mid);margin-bottom:6px;}
.cal-day.today .cal-day-num{color:var(--teal);}
.cal-event{font-size:10px;padding:3px 6px;border-radius:4px;margin-bottom:3px;cursor:pointer;line-height:1.3;transition:opacity .15s;}
.cal-event:hover{opacity:.8;}
.ev-spa{background:var(--purple-light,#EEF0FF);color:var(--purple);}
.ev-food{background:var(--teal-foam);color:var(--teal-dark);}
.ev-hotel{background:#FFF8E1;color:#F57F17;}
.ev-more{font-size:10px;color:var(--text-soft);padding:2px 6px;}

/* DAY VIEW */
.day-view{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.dv-head{background:var(--teal-deep);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.dv-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--white);}
.dv-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;}
.dv-close:hover{color:var(--white);}
.dv-list{padding:16px;}
.dv-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.dv-item:last-child{border-bottom:none;}
.dv-time{font-size:12px;font-weight:700;color:var(--teal-dark);min-width:50px;}
.dv-info{flex:1;}
.dv-name{font-size:13px;font-weight:600;color:var(--text);}
.dv-room{font-size:11px;color:var(--text-soft);}

/* ── REVENUE PAGE ── */
.rev-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.rev-card{background:var(--white);border-radius:14px;padding:20px;border:1px solid var(--border);}
.rev-card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:12px;}
.rev-cat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rev-cat-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mid);}
.rev-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rev-cat-val{font-size:13px;font-weight:700;color:var(--teal-dark);}
.rev-bar-wrap{height:6px;background:var(--teal-foam);border-radius:50px;margin-top:4px;overflow:hidden;}
.rev-bar{height:100%;border-radius:50px;transition:width .5s;}

.rev-total-box{background:linear-gradient(135deg,var(--teal-deep),var(--teal-dark));border-radius:14px;padding:24px;color:var(--white);text-align:center;margin-bottom:14px;}
.rev-total-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.7;}
.rev-total-val{font-family:'DM Serif Display',serif;font-size:40px;margin-top:6px;}
.rev-total-sub{font-size:12px;opacity:.6;margin-top:4px;}

/* ── STATS PAGE ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.stats-card{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:20px;}
.stats-card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);margin-bottom:14px;}
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{font-size:12px;color:var(--text-mid);min-width:70px;text-align:right;}
.bar-track{flex:1;height:8px;background:var(--teal-foam);border-radius:50px;overflow:hidden;}
.bar-fill{height:100%;border-radius:50px;background:var(--teal);transition:width .6s;}
.bar-val{font-size:11px;font-weight:600;color:var(--teal-dark);min-width:45px;}

.top-list{display:flex;flex-direction:column;gap:8px;}
.top-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--teal-foam);border-radius:10px;}
.top-rank{font-size:14px;font-weight:700;color:var(--teal-deep);min-width:24px;}
.top-name{flex:1;font-size:13px;color:var(--text-mid);}
.top-val{font-size:12px;font-weight:700;color:var(--teal-dark);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal-deep);color:var(--white);padding:10px 24px;border-radius:50px;font-size:13px;font-weight:500;z-index:500;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;box-shadow:0 6px 20px rgba(26,110,106,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RESPONSIVE */
@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .rev-grid{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr;}
  .cal-week{grid-template-columns:repeat(7,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Santosa</div>
    <div class="login-sub">Master Dashboard</div>
    <input class="login-input" type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <nav class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-name">Santosa</div>
      <div class="sb-logo-sub">Master Dashboard</div>
    </div>
    <div class="sb-nav">
      <div class="nav-item active" onclick="showPage('orders',this)"><span class="nav-icon">📋</span>Live Orders<span class="nav-badge" id="newBadge" style="display:none">0</span></div>
      <div class="nav-item" onclick="showPage('calendar',this)"><span class="nav-icon">📅</span>Calendar</div>
      <div class="nav-item" onclick="showPage('revenue',this)"><span class="nav-icon">💰</span>Revenue</div>
      <div class="nav-item" onclick="showPage('stats',this)"><span class="nav-icon">📊</span>Statistics</div>
    </div>
    <div class="sb-footer">
      <div class="sb-role">Master Access</div>
      <button class="logout-btn" onclick="doLogout()">⬅ Logout</button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle"><em>Live Orders</em></div>
      <div class="topbar-right">
        <span class="clock"><span class="live-dot"></span><span id="clock"></span></span>
      </div>
    </div>

    <div class="content">

      <!-- ORDERS PAGE -->
      <div class="page active" id="page-orders">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-label">New</div><div class="stat-value" id="sNew">—</div><div class="stat-sub">Awaiting action</div></div>
          <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" id="sProgress">—</div><div class="stat-sub">Being handled</div></div>
          <div class="stat-card"><div class="stat-label">Today Completed</div><div class="stat-value" id="sCompleted">—</div><div class="stat-sub">Done today</div></div>
          <div class="stat-card"><div class="stat-label">Today Revenue</div><div class="stat-value" id="sRevenue">—</div><div class="stat-sub">THB paid today</div></div>
        </div>
        <div class="sec-head">
          <h2>All Requests</h2>
          <div class="filter-tabs">
            <button class="ftab active" onclick="filterOrders('all',this)">All</button>
            <button class="ftab" onclick="filterOrders('new',this)">New</button>
            <button class="ftab" onclick="filterOrders('confirmed',this)">In Progress</button>
            <button class="ftab" onclick="filterOrders('completed',this)">Completed</button>
            <button class="ftab" onclick="filterOrders('food',this)">🍽 Food</button>
            <button class="ftab" onclick="filterOrders('hotel',this)">🏨 Hotel</button>
            <button class="ftab" onclick="filterOrders('spa',this)">💆 Spa</button>
          </div>
        </div>
        <div class="orders-list" id="ordersList">
          <div class="loading"><div class="spinner"></div><p>Loading…</p></div>
        </div>
      </div>

      <!-- CALENDAR PAGE -->
      <div class="page" id="page-calendar">
        <div class="cal-toolbar">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
            <div class="cal-date-label" id="calLabel"></div>
            <button class="cal-nav-btn" onclick="calNav(1)">›</button>
            <button class="ftab active" onclick="goToday()" style="margin-left:8px">Today</button>
          </div>
          <div class="filter-tabs">
            <button class="ftab active" id="calViewWeek" onclick="setCalView('week',this)">Week</button>
            <button class="ftab" id="calViewDay" onclick="setCalView('day',this)">Day</button>
          </div>
        </div>
        <div id="calContainer"></div>
      </div>

      <!-- REVENUE PAGE -->
      <div class="page" id="page-revenue">
        <div class="sec-head">
          <h2>Revenue</h2>
          <div class="filter-tabs">
            <button class="ftab active" onclick="loadRevenue('today',this)">Today</button>
            <button class="ftab" onclick="loadRevenue('week',this)">This Week</button>
            <button class="ftab" onclick="loadRevenue('month',this)">This Month</button>
            <button class="ftab" onclick="loadRevenue('all',this)">All Time</button>
          </div>
        </div>
        <div id="revenueContent">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- STATS PAGE -->
      <div class="page" id="page-stats">
        <div class="sec-head"><h2>Statistics</h2></div>
        <div id="statsContent">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB = 'https://zycptgrxnvbqsbngfuqi.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';
const PASS = { master:'santosa2024', restaurant:'rest2024', hotel:'hotel2024', spa:'spa2024' };
const ROLE = 'master'; // change per dashboard

let allRequests = [];
let currentFilter = 'all';
let calDate = new Date();
let calView = 'week';
let currentRevPeriod = 'today';
let pollTimer = null;

// ── AUTH ──
function doLogin(){
  const p = document.getElementById('loginPass').value;
  if(p === PASS[ROLE] || p === PASS.master){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('app').style.display='flex';
    startApp();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginPass').value='';
  }
}
function doLogout(){
  clearInterval(pollTimer);
  document.getElementById('app').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('loginPass').value='';
}

// ── START ──
function startApp(){
  updateClock(); setInterval(updateClock,1000);
  loadOrders();
  pollTimer = setInterval(loadOrders, 15000);
}
function updateClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-GB',{timeZone:'Asia/Bangkok',hour12:false});
}

// ── SUPABASE ──
async function sb(path, opts={}){
  const r = await fetch(`${SB}/rest/v1/${path}`,{
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  const t = await r.text(); return t ? JSON.parse(t) : null;
}

// ── NAV ──
function showPage(page, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
  const titles={orders:'<em>Live Orders</em>',calendar:'<em>Calendar</em>',revenue:'<em>Revenue</em>',stats:'<em>Statistics</em>'};
  document.getElementById('topbarTitle').innerHTML = titles[page];
  if(page==='calendar') renderCalendar();
  if(page==='revenue') loadRevenue(currentRevPeriod, document.querySelector('#page-revenue .ftab.active'));
  if(page==='stats') loadStats();
}

// ── ORDERS ──
async function loadOrders(){
  try {
    // Load both tables
    const [requests, orders] = await Promise.all([
      sb('requests?select=*&order=created_at.desc'),
      sb('orders?select=*&order=created_at.desc')
    ]);
    // Normalize orders to request format
    const normalizedOrders = (orders||[]).map(o=>({
      id: o.id, room_number: o.room_number,
      service_type: 'food', service_subtype: 'food_order',
      details: {items: o.items, notes: o.notes},
      total: o.total, status: o.status,
      created_at: o.created_at, notes: o.notes
    }));
    allRequests = [...(requests||[]), ...normalizedOrders]
      .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    renderOrders();
    updateOrderStats();
  } catch(e){ console.error(e); }
}

function renderOrders(){
  const list = document.getElementById('ordersList');
  let filtered = allRequests;
  if(currentFilter === 'new') filtered = allRequests.filter(r=>r.status==='new');
  else if(currentFilter === 'confirmed') filtered = allRequests.filter(r=>r.status==='confirmed'||r.status==='preparing');
  else if(currentFilter === 'completed') filtered = allRequests.filter(r=>r.status==='completed'||r.status==='delivered'||r.status==='paid');
  else if(['food','hotel','spa'].includes(currentFilter)) filtered = allRequests.filter(r=>r.service_type===currentFilter);

  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><p>No requests found</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(r=>requestCardHTML(r)).join('');

  const newCount = allRequests.filter(r=>r.status==='new').length;
  const badge = document.getElementById('newBadge');
  if(newCount>0){badge.textContent=newCount;badge.style.display='inline-block';}
  else badge.style.display='none';
}

function requestCardHTML(r){
  const time = new Date(r.created_at).toLocaleString('en-GB',{timeZone:'Asia/Bangkok',hour12:false,day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const status = r.status||'new';
  const typeClass = {food:'type-food',hotel:'type-hotel',spa:'type-spa'}[r.service_type]||'type-hotel';
  const statusLabel = {new:'🔵 New',confirmed:'🟡 In Progress',preparing:'🟡 Preparing',completed:'🟢 Completed',delivered:'🟢 Delivered',paid:'✅ Paid'}[status]||'🔵 New';
  const statusClass = {new:'s-new',confirmed:'s-confirmed',preparing:'s-confirmed',completed:'s-completed',delivered:'s-completed',paid:'s-paid'}[status]||'s-new';
  const serviceLabel = {food:'🍽️ Food & Drinks',hotel:'🏨 Hotel Service',spa:'💆 Spa & Wellness'}[r.service_type]||r.service_type;
  const subLabel = r.service_subtype ? ` · ${r.service_subtype}` : '';

  // Build details text
  let detailsHTML = '';
  if(r.service_type==='food' && r.details){
    const items = r.details.items || r.details;
    if(Array.isArray(items)){
      detailsHTML = items.map(i=>`${i.emoji||'🍽️'} ${i.name} × ${i.qty} — ${i.price*i.qty} THB`).join(' &nbsp;|&nbsp; ');
    }
  } else if(r.details){
    const d = typeof r.details==='string'?JSON.parse(r.details):r.details;
    detailsHTML = Object.entries(d).filter(([k,v])=>v&&k!=='notes').map(([k,v])=>`<b>${k}:</b> ${v}`).join(' &nbsp;·&nbsp; ');
  }
  if(r.notes) detailsHTML += (detailsHTML?'<br>':'') + `📝 ${r.notes}`;

  // Actions
  let actions = '';
  if(status==='new'){
    actions=`<button class="act-btn btn-confirm" onclick="updateStatus('${r.id}','confirmed','${r.service_type}')">🟡 Confirm</button>
             <button class="act-btn btn-del" onclick="deleteReq('${r.id}','${r.service_type}')">🗑</button>`;
  } else if(status==='confirmed'||status==='preparing'){
    actions=`<button class="act-btn btn-complete" onclick="updateStatus('${r.id}','completed','${r.service_type}')">✅ Complete</button>
             <button class="act-btn btn-del" onclick="deleteReq('${r.id}','${r.service_type}')">🗑</button>`;
  } else if(status==='completed'||status==='delivered'){
    actions=`<button class="act-btn btn-paid" onclick="updateStatus('${r.id}','paid','${r.service_type}')">💰 Mark Paid</button>
             <button class="act-btn btn-del" onclick="deleteReq('${r.id}','${r.service_type}')">🗑</button>`;
  } else {
    actions=`<button class="act-btn btn-del" onclick="deleteReq('${r.id}','${r.service_type}')">🗑 Remove</button>`;
  }

  return `<div class="order-card ${typeClass}" id="req-${r.id}">
    <div class="oc-head">
      <div class="oc-room">🛏 ${r.room_number}</div>
      <div class="oc-meta">
        <div class="oc-service">${serviceLabel}${subLabel}</div>
        <div class="oc-time">${time}</div>
      </div>
      ${r.total>0?`<div class="oc-total">${r.total.toLocaleString()} THB</div>`:''}
      <span class="status-badge ${statusClass}">${statusLabel}</span>
    </div>
    ${detailsHTML?`<div class="oc-details">${detailsHTML}</div>`:''}
    <div class="oc-actions">${actions}</div>
  </div>`;
}

async function updateStatus(id, status, type){
  const table = type==='food' ? 'orders' : 'requests';
  // map status for orders table
  const mappedStatus = type==='food' ? {confirmed:'preparing',completed:'delivered',paid:'paid'}[status]||status : status;
  try {
    await sb(`${table}?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:mappedStatus})});
    const req = allRequests.find(r=>r.id===id);
    if(req) req.status = status;
    renderOrders(); updateOrderStats();
    toast(`✅ Status updated to "${status}"`);
  } catch(e){ toast('⚠️ Error updating'); }
}

async function deleteReq(id, type){
  if(!confirm('Delete this request?')) return;
  const table = type==='food' ? 'orders' : 'requests';
  try {
    await sb(`${table}?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});
    allRequests = allRequests.filter(r=>r.id!==id);
    renderOrders(); updateOrderStats();
    toast('🗑 Deleted');
  } catch(e){ toast('⚠️ Error'); }
}

function filterOrders(f, el){
  currentFilter=f;
  document.querySelectorAll('#page-orders .ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function updateOrderStats(){
  const today = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
  const todayReqs = allRequests.filter(r=>r.created_at.startsWith(today));
  document.getElementById('sNew').textContent = allRequests.filter(r=>r.status==='new').length;
  document.getElementById('sProgress').textContent = allRequests.filter(r=>['confirmed','preparing'].includes(r.status)).length;
  document.getElementById('sCompleted').textContent = todayReqs.filter(r=>['completed','delivered','paid'].includes(r.status)).length;
  document.getElementById('sRevenue').textContent = todayReqs.filter(r=>r.status==='paid').reduce((s,r)=>s+(r.total||0),0).toLocaleString();
}

// ── CALENDAR ──
function renderCalendar(){
  if(calView==='week') renderWeek();
  else renderDayView(calDate);
}

function renderWeek(){
  // Get Monday of current week
  const d = new Date(calDate);
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day===0?6:day-1));

  const days = Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd;});
  const today = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});

  // Label
  const opts={month:'long',year:'numeric'};
  document.getElementById('calLabel').textContent = mon.toLocaleDateString('en-GB',opts);

  // Events from requests
  const eventsMap = {};
  allRequests.forEach(r=>{
    let dateKey = null;
    if(r.details){
      const d2 = typeof r.details==='string'?JSON.parse(r.details):r.details;
      dateKey = d2.date || r.requested_date;
    }
    if(!dateKey) dateKey = r.created_at.split('T')[0];
    if(!eventsMap[dateKey]) eventsMap[dateKey]=[];
    eventsMap[dateKey].push(r);
  });

  const html = `<div class="cal-week">
    ${days.map(d=>{
      const dk = d.toLocaleDateString('en-CA');
      const dayName = d.toLocaleDateString('en-GB',{weekday:'short'});
      const dayNum = d.getDate();
      const isToday = dk===today;
      const events = (eventsMap[dk]||[]).slice(0,3);
      const more = (eventsMap[dk]||[]).length-3;
      return `<div class="cal-day${isToday?' today':''}">
        <div class="cal-day-label">${dayName}</div>
        <div class="cal-day-num">${dayNum}</div>
        ${events.map(e=>`<div class="cal-event ev-${e.service_type}" onclick="renderDayView(new Date('${dk}'))" title="Room ${e.room_number}">${e.service_subtype||e.service_type} · Rm ${e.room_number}</div>`).join('')}
        ${more>0?`<div class="ev-more">+${more} more</div>`:''}
      </div>`;
    }).join('')}
  </div>`;

  document.getElementById('calContainer').innerHTML = html;
}

function renderDayView(date){
  calView='day';
  calDate=date;
  document.querySelectorAll('.cal-view-tabs .ftab').forEach(t=>t.classList.remove('active'));
  document.getElementById('calViewDay').classList.add('active');

  const dk = date.toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
  const label = date.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('calLabel').textContent = label;

  const dayRequests = allRequests.filter(r=>{
    let dateKey = null;
    if(r.details){
      const d2 = typeof r.details==='string'?JSON.parse(r.details):r.details;
      dateKey = d2.date || r.requested_date;
    }
    if(!dateKey) dateKey = r.created_at.split('T')[0];
    return dateKey===dk;
  }).sort((a,b)=>{
    const ta = (a.details?.time||a.requested_time||'00:00');
    const tb = (b.details?.time||b.requested_time||'00:00');
    return ta.localeCompare(tb);
  });

  const serviceLabel = {food:'🍽️ Food',hotel:'🏨 Hotel',spa:'💆 Spa'}

  document.getElementById('calContainer').innerHTML = `
    <div class="day-view">
      <div class="dv-head">
        <div class="dv-title">${label}</div>
        <button class="dv-close" onclick="setCalView('week',document.getElementById('calViewWeek'))">✕ Week view</button>
      </div>
      <div class="dv-list">
        ${dayRequests.length ? dayRequests.map(r=>{
          const time = r.details?.time || r.requested_time || new Date(r.created_at).toLocaleTimeString('en-GB',{timeZone:'Asia/Bangkok',hour:'2-digit',minute:'2-digit'});
          const name = r.details?.option || r.details?.treatments ? Object.keys(r.details.treatments||{}).join(', ') : r.service_subtype||r.service_type;
          return `<div class="dv-item">
            <div class="dv-time">${time}</div>
            <div class="dv-info">
              <div class="dv-name">${serviceLabel[r.service_type]||'📋'} ${name}</div>
              <div class="dv-room">Room ${r.room_number}${r.total>0?' · '+r.total.toLocaleString()+' THB':''}</div>
            </div>
            <span class="status-badge s-${r.status==='new'?'new':r.status==='paid'?'paid':'confirmed'}">${r.status||'new'}</span>
          </div>`;
        }).join('') : '<div style="text-align:center;padding:32px;color:var(--text-soft)">No requests for this day</div>'}
      </div>
    </div>`;
}

function setCalView(view, el){
  calView=view;
  document.querySelectorAll('#page-calendar .ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderCalendar();
}
function calNav(dir){
  if(calView==='week'){calDate.setDate(calDate.getDate()+dir*7);}
  else {calDate.setDate(calDate.getDate()+dir);}
  renderCalendar();
}
function goToday(){ calDate=new Date(); renderCalendar(); }

// ── REVENUE ──
async function loadRevenue(period, el){
  currentRevPeriod=period;
  document.querySelectorAll('#page-revenue .ftab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');

  const now = new Date();
  const tz = 'Asia/Bangkok';
  const today = now.toLocaleDateString('en-CA',{timeZone:tz});

  let filtered = allRequests.filter(r=>r.status==='paid'||r.status==='delivered');
  if(period==='today') filtered = filtered.filter(r=>r.created_at.startsWith(today));
  else if(period==='week'){
    const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
    filtered = filtered.filter(r=>new Date(r.created_at)>=weekAgo);
  } else if(period==='month'){
    const monthAgo = new Date(now); monthAgo.setDate(now.getDate()-30);
    filtered = filtered.filter(r=>new Date(r.created_at)>=monthAgo);
  }

  const total = filtered.reduce((s,r)=>s+(r.total||0),0);
  const byType = {food:0,hotel:0,spa:0};
  filtered.forEach(r=>{ byType[r.service_type]=(byType[r.service_type]||0)+(r.total||0); });
  const maxCat = Math.max(...Object.values(byType),1);

  const periodLabel = {today:'Today',week:'This Week',month:'This Month',all:'All Time'}[period];

  document.getElementById('revenueContent').innerHTML = `
    <div class="rev-total-box">
      <div class="rev-total-label">Total Revenue · ${periodLabel}</div>
      <div class="rev-total-val">${total.toLocaleString()} THB</div>
      <div class="rev-total-sub">${filtered.length} paid transactions</div>
    </div>
    <div class="rev-grid">
      <div class="rev-card">
        <div class="rev-card-title">By Category</div>
        ${[['food','🍽️ Food & Drinks','#3DBFB7'],['hotel','🏨 Hotel Services','#D4A847'],['spa','💆 Spa & Wellness','#6C63FF']].map(([k,label,color])=>`
          <div class="rev-cat-row">
            <div class="rev-cat-label"><span class="rev-cat-dot" style="background:${color}"></span>${label}</div>
            <div class="rev-cat-val">${(byType[k]||0).toLocaleString()} THB</div>
          </div>
          <div class="rev-bar-wrap"><div class="rev-bar" style="width:${Math.round((byType[k]||0)/maxCat*100)}%;background:${color}"></div></div>
        `).join('')}
      </div>
      <div class="rev-card">
        <div class="rev-card-title">Top Rooms by Spend</div>
        ${topRoomsByRevenue(filtered).map((item,i)=>`
          <div class="rev-cat-row">
            <div class="rev-cat-label">🛏 Room ${item.room}</div>
            <div class="rev-cat-val">${item.total.toLocaleString()} THB</div>
          </div>`).join('') || '<p style="font-size:13px;color:var(--text-soft)">No data yet</p>'}
      </div>
    </div>`;
}

function topRoomsByRevenue(reqs){
  const map={};
  reqs.forEach(r=>{map[r.room_number]=(map[r.room_number]||0)+(r.total||0);});
  return Object.entries(map).map(([room,total])=>({room,total})).sort((a,b)=>b.total-a.total).slice(0,5);
}

// ── STATS ──
async function loadStats(){
  const byType={food:0,hotel:0,spa:0};
  const byRoom={};
  const bySubtype={};
  const byDay={};
  allRequests.forEach(r=>{
    byType[r.service_type]=(byType[r.service_type]||0)+1;
    byRoom[r.room_number]=(byRoom[r.room_number]||0)+1;
    const sub=r.service_subtype||r.service_type;
    bySubtype[sub]=(bySubtype[sub]||0)+1;
    const day=r.created_at.split('T')[0];
    byDay[day]=(byDay[day]||0)+1;
  });
  const totalReqs=allRequests.length||1;
  const topRooms=Object.entries(byRoom).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topServices=Object.entries(bySubtype).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Last 7 days
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-6+i);
    const k=d.toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
    return {label:d.toLocaleDateString('en-GB',{weekday:'short'}),count:byDay[k]||0};
  });
  const max7=Math.max(...last7.map(d=>d.count),1);

  document.getElementById('statsContent').innerHTML=`
    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-title">Requests by Category</div>
        <div class="bar-chart">
          ${[['food','🍽️ Food',byType.food],['hotel','🏨 Hotel',byType.hotel],['spa','💆 Spa',byType.spa]].map(([k,label,count])=>`
            <div class="bar-row">
              <div class="bar-label">${label}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/totalReqs*100)}%"></div></div>
              <div class="bar-val">${count} req</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Last 7 Days Activity</div>
        <div class="bar-chart">
          ${last7.map(d=>`
            <div class="bar-row">
              <div class="bar-label">${d.label}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.count/max7*100)}%"></div></div>
              <div class="bar-val">${d.count} req</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Most Active Rooms</div>
        <div class="top-list">
          ${topRooms.map(([room,count],i)=>`
            <div class="top-item">
              <div class="top-rank">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</div>
              <div class="top-name">Room ${room}</div>
              <div class="top-val">${count} requests</div>
            </div>`).join('') || '<p style="font-size:13px;color:var(--text-soft)">No data yet</p>'}
        </div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">Most Requested Services</div>
        <div class="top-list">
          ${topServices.map(([service,count],i)=>`
            <div class="top-item">
              <div class="top-rank">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</div>
              <div class="top-name">${service}</div>
              <div class="top-val">${count} times</div>
            </div>`).join('') || '<p style="font-size:13px;color:var(--text-soft)">No data yet</p>'}
        </div>
      </div>
    </div>`;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

updateClock();
</script>
