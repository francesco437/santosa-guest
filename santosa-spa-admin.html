<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosa — Spa Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{--teal:#3DBFB7;--teal-dark:#2A9E97;--teal-deep:#1A6E6A;--teal-light:#B2E8E5;--teal-foam:#EBF9F8;--white:#FFFFFF;--bg:#F4FAFA;--text:#0F2E2D;--text-mid:#3A6664;--text-soft:#7AADAB;--border:#C8EDED;--red:#E53935;--purple:#6C63FF;--sidebar-w:200px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A2E4A,var(--teal-deep));}
.login-box{background:var(--white);border-radius:24px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(26,110,106,.3);text-align:center;}
.login-logo{font-family:'DM Serif Display',serif;font-size:28px;color:var(--teal-deep);}
.login-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);margin-bottom:32px;margin-top:4px;}
.login-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--teal-foam);outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px;}
.login-btn{width:100%;padding:14px;background:var(--purple);color:var(--white);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.login-err{color:var(--red);font-size:13px;margin-top:10px;display:none;}
.app{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:#1A2E4A;display:flex;flex-direction:column;z-index:50;}
.sb-logo{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-logo-name{font-family:'DM Serif Display',serif;font-size:20px;color:var(--white);}
.sb-logo-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:2px;}
.sb-nav{flex:1;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.nav-item.active{color:var(--white);background:rgba(108,99,255,.2);border-left-color:var(--purple);}
.nav-badge{background:var(--purple);color:var(--white);border-radius:50px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:auto;}
.sb-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
.logout-btn{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.45);cursor:pointer;}
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.topbar-title{font-family:'DM Serif Display',serif;font-size:20px;color:#1A2E4A;}
.topbar-title em{font-style:italic;color:var(--purple);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--purple);animation:pulse 1.5s infinite;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.content{padding:24px 28px 80px;flex:1;}
.page{display:none;}
.page.active{display:block;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:14px;padding:18px;border:1px solid var(--border);}
.stat-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-soft);}
.stat-value{font-family:'DM Serif Display',serif;font-size:28px;color:#1A2E4A;margin-top:4px;}
.stat-sub{font-size:11px;color:var(--text-soft);margin-top:2px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-head h2{font-family:'DM Serif Display',serif;font-size:18px;color:#1A2E4A;}
.filter-tabs{display:flex;gap:5px;}
.ftab{padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--teal-foam);color:var(--text-soft);font-family:'DM Sans',sans-serif;transition:all .15s;}
.ftab.active{background:var(--purple);color:var(--white);}
.orders-list{display:flex;flex-direction:column;gap:10px;}
.order-card{background:var(--white);border-radius:14px;border:1px solid var(--border);border-left:3px solid var(--purple);overflow:hidden;}
.oc-head{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--teal-foam);}
.oc-room{font-family:'DM Serif Display',serif;font-size:20px;color:#1A2E4A;min-width:55px;}
.oc-meta{flex:1;}
.oc-service{font-size:12px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.5px;}
.oc-time{font-size:11px;color:var(--text-soft);}
.oc-appt{font-size:12px;font-weight:600;color:var(--purple);margin-top:2px;}
.oc-total{font-size:14px;font-weight:700;color:var(--purple);}
.status-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600;text-transform:uppercase;}
.s-new{background:#EEF0FF;color:var(--purple);}
.s-confirmed{background:#FFF8E1;color:#F57F17;}
.s-completed{background:#E8F5E9;color:#2E7D32;}
.s-paid{background:#E8F5E9;color:#1B5E20;}
.oc-details{padding:10px 16px;font-size:12px;color:var(--text-mid);line-height:1.7;background:var(--bg);}
.oc-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--teal-foam);background:var(--bg);}
.act-btn{flex:1;padding:8px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
.btn-confirm{background:#EEF0FF;color:var(--purple);}
.btn-complete{background:#E8F5E9;color:#2E7D32;}
.btn-paid{background:var(--purple);color:var(--white);}
.btn-rm{background:#FFEBEE;color:var(--red);max-width:40px;}

/* CALENDAR */
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cal-label{font-family:'DM Serif Display',serif;font-size:18px;color:#1A2E4A;}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.cal-day{background:var(--white);border-radius:12px;border:1px solid var(--border);min-height:110px;padding:10px;}
.cal-day.today{border-color:var(--purple);box-shadow:0 0 0 2px rgba(108,99,255,.15);}
.cal-day-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);margin-bottom:4px;}
.cal-day-num{font-size:16px;font-weight:700;color:var(--text-mid);margin-bottom:6px;}
.cal-day.today .cal-day-num{color:var(--purple);}
.cal-ev{font-size:10px;padding:3px 6px;border-radius:4px;margin-bottom:3px;background:#EEF0FF;color:var(--purple);line-height:1.3;}

.empty-state{text-align:center;padding:50px;color:var(--text-soft);}
.loading{text-align:center;padding:50px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A2E4A;color:var(--white);padding:10px 24px;border-radius:50px;font-size:13px;font-weight:500;z-index:500;opacity:0;pointer-events:none;transition:all .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Santosa</div>
    <div class="login-sub">Spa & Wellness Dashboard</div>
    <input class="login-input" type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr">Incorrect password</div>
  </div>
</div>
<div class="app" id="app">
  <nav class="sidebar">
    <div class="sb-logo"><div class="sb-logo-name">Santosa</div><div class="sb-logo-sub">Spa & Wellness</div></div>
    <div class="sb-nav">
      <div class="nav-item active" onclick="showPage('bookings',this)"><span>📋</span> Bookings <span class="nav-badge" id="newBadge" style="display:none">0</span></div>
      <div class="nav-item" onclick="showPage('calendar',this)"><span>📅</span> Calendar</div>
    </div>
    <div class="sb-footer"><button class="logout-btn" onclick="doLogout()">⬅ Logout</button></div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topTitle">💆 <em>Spa Bookings</em></div>
      <span style="font-size:12px;color:var(--text-soft)"><span class="live-dot"></span><span id="clock"></span></span>
    </div>
    <div class="content">

      <!-- BOOKINGS -->
      <div class="page active" id="page-bookings">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-label">New</div><div class="stat-value" id="sNew">—</div><div class="stat-sub">To confirm</div></div>
          <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value" id="sConf">—</div><div class="stat-sub">Upcoming</div></div>
          <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value" id="sToday">—</div><div class="stat-sub">Appointments</div></div>
          <div class="stat-card"><div class="stat-label">Revenue Today</div><div class="stat-value" id="sRev">—</div><div class="stat-sub">THB collected</div></div>
        </div>
        <div class="sec-head">
          <h2>Spa Bookings</h2>
          <div class="filter-tabs">
            <button class="ftab active" onclick="filt('all',this)">All</button>
            <button class="ftab" onclick="filt('new',this)">New</button>
            <button class="ftab" onclick="filt('confirmed',this)">Confirmed</button>
            <button class="ftab" onclick="filt('completed',this)">Completed</button>
            <button class="ftab" onclick="filt('paid',this)">Paid</button>
          </div>
        </div>
        <div class="orders-list" id="reqList"><div class="loading"><div class="spinner"></div></div></div>
      </div>

      <!-- CALENDAR -->
      <div class="page" id="page-calendar">
        <div class="cal-toolbar">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
            <div class="cal-label" id="calLabel"></div>
            <button class="cal-nav-btn" onclick="calNav(1)">›</button>
            <button class="ftab active" onclick="goToday()" style="margin-left:8px">Today</button>
          </div>
        </div>
        <div id="calContainer"></div>
      </div>

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://zycptgrxnvbqsbngfuqi.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';
const PASS='spa2024';
let all=[],cf='all',pt=null,calDate=new Date();
function doLogin(){if(document.getElementById('loginPass').value===PASS||document.getElementById('loginPass').value==='santosa2024'){document.getElementById('loginWrap').style.display='none';document.getElementById('app').style.display='flex';start();}else{document.getElementById('loginErr').style.display='block';document.getElementById('loginPass').value='';}}
function doLogout(){clearInterval(pt);document.getElementById('app').style.display='none';document.getElementById('loginWrap').style.display='flex';}
function start(){tick();setInterval(tick,1000);load();pt=setInterval(load,15000);}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:'Asia/Bangkok',hour12:false});}
async function sbq(p,o={}){const r=await fetch(`${SB}/rest/v1/${p}`,{headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'return=representation',...(o.headers||{})},... o});const t=await r.text();return t?JSON.parse(t):null;}
async function load(){try{all=await sbq('requests?select=*&service_type=eq.spa&order=created_at.desc')||[];render();stats();}catch(e){console.error(e);}}

function showPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
  const titles={bookings:'💆 <em>Spa Bookings</em>',calendar:'📅 <em>Calendar</em>'};
  document.getElementById('topTitle').innerHTML=titles[page];
  if(page==='calendar') renderCal();
}

function render(){
  const list=document.getElementById('reqList');
  let d=cf==='all'?all:all.filter(r=>r.status===cf);
  if(!d.length){list.innerHTML='<div class="empty-state">💆 No bookings</div>';return;}
  list.innerHTML=d.map(r=>{
    const det=typeof r.details==='string'?JSON.parse(r.details||'{}'):r.details||{};
    const time=new Date(r.created_at).toLocaleString('en-GB',{timeZone:'Asia/Bangkok',hour12:false,day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const appt=det.date?`📅 ${det.date}${det.time?' at '+det.time:''}`:'';
    const treatments=det.treatments?Object.keys(det.treatments).join(', '):'';
    const notes=det.notes||r.notes||'';
    const detStr=[treatments&&`Treatments: ${treatments}`,notes&&`Note: ${notes}`].filter(Boolean).join(' · ');
    const sc={new:'s-new',confirmed:'s-confirmed',completed:'s-completed',paid:'s-paid'}[r.status]||'s-new';
    const sl={new:'🔵 New',confirmed:'🟡 Confirmed',completed:'✅ Completed',paid:'💰 Paid'}[r.status]||'🔵 New';
    const sub=r.service_subtype==='treatment'?'💆 Treatment':(r.service_subtype==='program'?'🌿 Program':(r.service_subtype==='class'?'🧘 Class':'💆 Spa'));
    let actions='';
    if(r.status==='new') actions=`<button class="act-btn btn-confirm" onclick="upd('${r.id}','confirmed')">🟡 Confirm</button><button class="act-btn btn-rm" onclick="del('${r.id}')">🗑</button>`;
    else if(r.status==='confirmed') actions=`<button class="act-btn btn-complete" onclick="upd('${r.id}','completed')">✅ Complete</button><button class="act-btn btn-rm" onclick="del('${r.id}')">🗑</button>`;
    else if(r.status==='completed') actions=`<button class="act-btn btn-paid" onclick="upd('${r.id}','paid')">💰 Mark Paid</button><button class="act-btn btn-rm" onclick="del('${r.id}')">🗑</button>`;
    else actions=`<button class="act-btn btn-rm" onclick="del('${r.id}')">🗑 Remove</button>`;
    return `<div class="order-card"><div class="oc-head"><div class="oc-room">🛏 ${r.room_number}</div><div class="oc-meta"><div class="oc-service">${sub}</div><div class="oc-time">${time}</div>${appt?`<div class="oc-appt">${appt}</div>`:''}</div>${r.total>0?`<div class="oc-total">${r.total.toLocaleString()} THB</div>`:''}<span class="status-badge ${sc}">${sl}</span></div>${detStr?`<div class="oc-details">${detStr}</div>`:''}<div class="oc-actions">${actions}</div></div>`;
  }).join('');
  const nc=all.filter(r=>r.status==='new').length;
  const b=document.getElementById('newBadge');
  if(nc>0){b.textContent=nc;b.style.display='inline-block';}else b.style.display='none';
}

function stats(){
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
  const td=all.filter(r=>r.created_at.startsWith(today));
  document.getElementById('sNew').textContent=all.filter(r=>r.status==='new').length;
  document.getElementById('sConf').textContent=all.filter(r=>r.status==='confirmed').length;
  document.getElementById('sToday').textContent=td.length;
  document.getElementById('sRev').textContent=td.filter(r=>r.status==='paid').reduce((s,r)=>s+(r.total||0),0).toLocaleString();
}

async function upd(id,status){try{await sbq(`requests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});const r=all.find(r=>r.id===id);if(r)r.status=status;render();stats();toast('✅ Updated');}catch(e){toast('⚠️ Error');}}
async function del(id){if(!confirm('Delete?'))return;try{await sbq(`requests?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});all=all.filter(r=>r.id!==id);render();stats();toast('🗑 Deleted');}catch(e){toast('⚠️ Error');}}
function filt(f,el){cf=f;document.querySelectorAll('#page-bookings .ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}

function renderCal(){
  const d=new Date(calDate);
  const day=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
  const days=Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd;});
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
  document.getElementById('calLabel').textContent=mon.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const evMap={};
  all.forEach(r=>{
    const det=typeof r.details==='string'?JSON.parse(r.details||'{}'):r.details||{};
    const dk=det.date||r.requested_date||r.created_at.split('T')[0];
    if(!evMap[dk])evMap[dk]=[];
    evMap[dk].push(r);
  });
  document.getElementById('calContainer').innerHTML=`<div class="cal-week">${days.map(d=>{
    const dk=d.toLocaleDateString('en-CA');
    const evs=(evMap[dk]||[]).slice(0,3);
    const more=(evMap[dk]||[]).length-3;
    return `<div class="cal-day${dk===today?' today':''}">
      <div class="cal-day-lbl">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
      <div class="cal-day-num">${d.getDate()}</div>
      ${evs.map(e=>{const det2=typeof e.details==='string'?JSON.parse(e.details||'{}'):e.details||{};const t=det2.time||'';return `<div class="cal-ev">${t?t+' ':''}Rm ${e.room_number}</div>`;}).join('')}
      ${more>0?`<div style="font-size:10px;color:var(--text-soft);padding:2px 6px">+${more} more</div>`:''}
    </div>`;
  }).join('')}</div>`;
}
function calNav(d){calDate.setDate(calDate.getDate()+d*7);renderCal();}
function goToday(){calDate=new Date();renderCal();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
