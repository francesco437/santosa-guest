<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosa — Spa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#3DBFB7; --teal-dark:#2A9E97; --teal-deep:#1A6E6A; --teal-light:#B2E8E5; --teal-foam:#EBF9F8;
  --sidebar:#1C1C1E; --sidebar-hover:rgba(255,255,255,0.06); --sidebar-active:rgba(61,191,183,0.15);
  --white:#FFFFFF; --bg:#F5F5F7;
  --text:#1D1D1F; --text-mid:#3A3A3C; --text-soft:#8E8E93;
  --border:rgba(0,0,0,0.08); --border-strong:rgba(0,0,0,0.12);
  --radius:16px; --radius-sm:10px;
  --shadow:0 2px 20px rgba(0,0,0,0.07);
  --sidebar-w:240px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2027,#1A6E6A,#3DBFB7);}
.login-box{background:rgba(255,255,255,0.97);backdrop-filter:blur(40px);border-radius:28px;padding:52px 44px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,0.2);text-align:center;}
.login-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--teal-deep),var(--teal));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.login-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-soft);margin-bottom:32px;}
.login-input{width:100%;padding:14px 18px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;margin-bottom:12px;text-align:center;letter-spacing:3px;transition:border .2s;}
.login-input:focus{border-color:var(--teal);}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--teal-deep),var(--teal));color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.login-btn:hover{opacity:.9;}
.login-err{color:#E53935;font-size:13px;margin-top:10px;display:none;}

/* APP */
.app{display:none;min-height:100vh;width:100%;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;z-index:50;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sb-header{padding:28px 20px 20px;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-logo{display:flex;align-items:center;gap:12px;}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--teal-deep),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logo-text .name{font-family:'DM Serif Display',serif;font-size:18px;color:var(--white);line-height:1.1;}
.sb-logo-text .sub{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:2px;}
.sb-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.8);}
.nav-item.active{background:var(--sidebar-active);color:var(--white);}
.nav-icon{width:18px;height:18px;flex-shrink:0;opacity:.7;}
.nav-item.active .nav-icon{opacity:1;color:var(--teal);}
.nav-badge{background:var(--teal);color:var(--white);border-radius:50px;padding:2px 8px;font-size:10px;font-weight:700;margin-left:auto;}
.sb-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,.06);}
.logout-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:rgba(255,255,255,.35);cursor:pointer;background:none;border:none;width:100%;transition:all .15s;}
.logout-btn:hover{color:rgba(255,255,255,.6);background:var(--sidebar-hover);}

/* MAIN */
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;flex:1;}
.topbar{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-menu-btn{display:none;width:36px;height:36px;border:none;background:var(--bg);border-radius:8px;align-items:center;justify-content:center;cursor:pointer;color:var(--text-mid);}
.topbar-title{font-size:17px;font-weight:700;color:var(--text);}
.topbar-title span{color:var(--teal-dark);}
.live-pill{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);padding:6px 14px;border-radius:50px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.5);}}
.clock{font-size:13px;font-weight:600;color:var(--text-mid);font-variant-numeric:tabular-nums;}
.content{padding:24px 28px 60px;flex:1;}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-soft);}
.stat-value{font-family:'DM Serif Display',serif;font-size:30px;color:var(--text);line-height:1;margin-top:4px;}
.stat-sub{font-size:11px;color:var(--text-soft);margin-top:3px;}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;}
.sec-head h2{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;}
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.ftab{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text-soft);transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.ftab:hover{border-color:var(--teal);color:var(--teal-dark);}
.ftab.active{background:var(--teal);color:var(--white);border-color:var(--teal);}

/* BOOKING CARDS */
.orders-list{display:flex;flex-direction:column;gap:10px;}
.order-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:transform .15s;}
.order-card:hover{transform:translateY(-1px);}
.oc-head{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--border);}
.oc-room-badge{background:linear-gradient(135deg,var(--teal-deep),var(--teal-dark));color:var(--white);border-radius:10px;padding:8px 14px;font-family:'DM Serif Display',serif;font-size:17px;white-space:nowrap;}
.oc-meta{flex:1;}
.oc-service{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.oc-time{font-size:11px;color:var(--text-soft);display:flex;align-items:center;gap:5px;}
.oc-appt{font-size:11px;color:var(--teal-dark);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:4px;}
.oc-total{font-size:15px;font-weight:700;color:var(--teal-dark);white-space:nowrap;}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;font-size:11px;font-weight:600;white-space:nowrap;}
.s-new{background:#EFF6FF;color:#1D4ED8;}
.s-confirmed{background:#FFFBEB;color:#B45309;}
.s-completed{background:#F0FDF4;color:#166534;}
.s-paid{background:#F0FDF4;color:#14532D;}
.oc-details{padding:12px 18px;font-size:13px;color:var(--text-mid);line-height:1.8;background:var(--bg);}
.oc-actions{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--border);}
.act-btn{flex:1;padding:9px 12px;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-confirm{background:#FFFBEB;color:#B45309;}
.btn-confirm:hover{background:#FEF3C7;}
.btn-complete{background:#F0FDF4;color:#166534;}
.btn-complete:hover{background:#DCFCE7;}
.btn-paid{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:var(--white);}
.btn-paid:hover{opacity:.9;}
.btn-rm{background:#FEF2F2;color:#B91C1C;max-width:42px;flex:none;}
.btn-rm:hover{background:#FEE2E2;}

/* SERVICE PILLS */
.service-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;}
.sp-treatment{background:#F5F3FF;color:#5B21B6;}
.sp-program{background:#ECFDF5;color:#065F46;}
.sp-class{background:#EFF6FF;color:#1D4ED8;}
.sp-default{background:var(--bg);color:var(--text-soft);}

/* CALENDAR */
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cal-nav-btn{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-mid);transition:all .15s;}
.cal-nav-btn:hover{border-color:var(--teal);color:var(--teal-dark);}
.cal-title{font-size:16px;font-weight:700;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);text-align:center;padding:8px 4px;}
.cal-day{background:var(--white);border-radius:var(--radius-sm);border:1px solid var(--border);padding:10px 8px;min-height:80px;cursor:pointer;transition:all .15s;}
.cal-day:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(61,191,183,.15);}
.cal-day.today{border-color:var(--teal);background:var(--teal-foam);}
.cal-day.other-month{opacity:.35;}
.cal-day-num{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
.cal-event{background:var(--teal-foam);border-left:2px solid var(--teal);border-radius:4px;padding:2px 5px;font-size:10px;font-weight:600;color:var(--teal-dark);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-more{font-size:10px;color:var(--text-soft);font-weight:600;margin-top:3px;}

/* REVENUE */
.rev-total-box{background:linear-gradient(135deg,#0a1f1e,var(--teal-deep));border-radius:var(--radius);padding:32px 36px;color:white;margin-bottom:20px;position:relative;overflow:hidden;}
.rev-total-box::after{content:"฿";position:absolute;right:28px;top:50%;transform:translateY(-50%);font-size:110px;font-weight:800;opacity:0.06;pointer-events:none;}
.rev-total-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:0.55;margin-bottom:8px;font-weight:700;}
.rev-total-val{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;}
.rev-total-val span{font-size:22px;opacity:0.6;font-weight:600;}
.rev-total-sub{font-size:12px;opacity:0.5;margin-top:8px;}
.rev-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.rev-card{background:var(--white);border-radius:var(--radius);padding:22px;border:1px solid var(--border);box-shadow:var(--shadow);}
.rev-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.rev-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.rev-row:last-child{border-bottom:none;}
.rev-row-label{font-size:13px;color:var(--text-mid);}
.rev-row-val{font-size:13px;font-weight:700;color:var(--text);}
.rev-bar-wrap{height:4px;background:var(--bg);border-radius:2px;margin-top:4px;}
.rev-bar{height:4px;background:var(--teal);border-radius:2px;transition:width .4s;}
.top-list{display:flex;flex-direction:column;gap:2px;}
.top-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.top-item:last-child{border-bottom:none;}
.top-rank{font-size:16px;min-width:24px;text-align:center;}
.top-name{flex:1;font-size:13px;color:var(--text-mid);}
.top-val{font-size:13px;font-weight:700;color:var(--text);}

/* MISC */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-soft);}
.empty-state p{font-size:14px;margin-top:10px;}
.loading{text-align:center;padding:60px;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sidebar);color:var(--white);padding:10px 24px;border-radius:50px;font-size:13px;font-weight:500;z-index:500;opacity:0;pointer-events:none;transition:all .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Calendar views */
.cal-view-btn{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text-soft);transition:all .15s;font-family:'DM Sans',sans-serif;}
.cal-view-btn:hover{border-color:var(--teal);color:var(--teal-dark);}
.cal-view-btn.active{background:var(--teal);color:var(--white);border-color:var(--teal);}

/* Month view */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-day-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-soft);text-align:center;padding:8px 4px;}
.cal-day{background:var(--white);border-radius:var(--radius-sm);border:1px solid var(--border);padding:10px 8px;min-height:90px;cursor:pointer;transition:all .15s;}
.cal-day:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(61,191,183,.15);}
.cal-day.today{border-color:var(--teal);background:var(--teal-foam);}
.cal-day.other-month{opacity:.35;}
.cal-day-num{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
.cal-event{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event.ev-system{background:var(--teal-foam);border-left:2px solid var(--teal);color:var(--teal-dark);}
.cal-event.ev-manual{background:#F5F3FF;border-left:2px solid #7C3AED;color:#5B21B6;}
.cal-more{font-size:10px;color:var(--text-soft);font-weight:600;margin-top:3px;}

/* Week view */
.week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--white);}
.week-header{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 6px;text-align:center;}
.week-header.today-col{background:var(--teal-foam);}
.week-time-col{border-right:1px solid var(--border);background:var(--bg);}
.week-time-lbl{height:48px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text-soft);border-bottom:1px solid var(--border);padding:0 6px;}
.week-col{border-right:1px solid var(--border);position:relative;}
.week-col:last-child{border-right:none;}
.week-slot{height:48px;border-bottom:1px solid rgba(0,0,0,0.04);cursor:pointer;transition:background .1s;}
.week-slot:hover{background:var(--teal-foam);}
.week-slot.today-col{background:rgba(61,191,183,0.04);}
.week-event{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 6px;font-size:10px;font-weight:600;overflow:hidden;cursor:pointer;z-index:2;}
.week-event.ev-system{background:var(--teal-foam);border:1px solid var(--teal-light);color:var(--teal-dark);}
.week-event.ev-manual{background:#F5F3FF;border:1px solid #C4B5FD;color:#5B21B6;}

/* Day view */
.day-grid{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.day-slot-row{display:grid;grid-template-columns:70px 1fr;border-bottom:1px solid rgba(0,0,0,0.05);}
.day-slot-row:last-child{border-bottom:none;}
.day-time{padding:12px 14px;font-size:11px;font-weight:600;color:var(--text-soft);border-right:1px solid var(--border);background:var(--bg);display:flex;align-items:center;}
.day-slot{padding:6px 10px;min-height:48px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px;}
.day-slot:hover{background:var(--teal-foam);}
.day-slot.occupied{cursor:default;background:#FAFAFA;}
.day-appt-block{flex:1;background:var(--teal-foam);border:1px solid var(--teal-light);border-radius:8px;padding:8px 10px;}
.day-appt-block.manual{background:#F5F3FF;border-color:#C4B5FD;}
.day-appt-name{font-size:12px;font-weight:700;color:var(--text);}
.day-appt-detail{font-size:11px;color:var(--text-soft);margin-top:2px;}
.day-appt-delete{background:none;border:none;color:#B91C1C;cursor:pointer;padding:4px;border-radius:4px;opacity:.6;}
.day-appt-delete:hover{opacity:1;background:#FEF2F2;}
.day-add-hint{font-size:11px;color:var(--text-soft);opacity:0;}
.day-slot:hover .day-add-hint{opacity:1;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;backdrop-filter:blur(4px);}
.modal-overlay.open{display:block;}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--white);border-radius:20px;width:100%;max-width:480px;box-shadow:0 40px 80px rgba(0,0,0,.2);z-index:100;padding:0;}
.modal.open{display:block;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-soft);padding:4px;border-radius:6px;}
.modal-close:hover{background:var(--bg);}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-soft);}
.form-input{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:10px 12px;background:var(--bg);outline:none;width:100%;transition:border .15s;}
.form-input:focus{border-color:var(--teal);background:var(--teal-foam);}
.modal-footer{display:flex;gap:10px;padding:16px 24px;border-top:1px solid var(--border);}
.modal-btn-cancel{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:var(--white);color:var(--text-soft);transition:all .15s;}
.modal-btn-cancel:hover{border-color:var(--border-strong);}
.modal-btn-save{flex:2;padding:11px;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--teal-deep),var(--teal));color:var(--white);transition:opacity .15s;}
.modal-btn-save:hover{opacity:.9;}
.modal-btn-save:disabled{opacity:.4;cursor:default;}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;backdrop-filter:blur(2px);}
.sidebar-overlay.open{display:block;}

@media(max-width:768px){
  .modal{max-width:calc(100% - 32px);}
  .week-grid{grid-template-columns:44px repeat(7,1fr);}
  .week-time-lbl{font-size:9px;padding:0 3px;}
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .topbar{padding:0 16px;height:56px;}
  .topbar-menu-btn{display:flex;}
  .content{padding:16px 16px 60px;}
  .stats-row{grid-template-columns:1fr 1fr;gap:10px;}

<script>
const SB='https://zycptgrxnvbqsbngfuqi.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';
const PASS='spa2024';
let all=[],cf='all',pt=null,calDate=new Date();

function doLogin(){
  const v=document.getElementById('loginPass').value;
  if(v===PASS||v==='santosa2024'){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('app').style.display='flex';
    start();
  }else{document.getElementById('loginErr').style.display='block';document.getElementById('loginPass').value='';}
}
function doLogout(){clearInterval(pt);document.getElementById('app').style.display='none';document.getElementById('loginWrap').style.display='flex';}
function start(){tick();setInterval(tick,1000);load();loadManualAppts();pt=setInterval(load,15000);}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:'Asia/Bangkok',hour12:false});}
async function sbq(p,o={}){
  const {headers:extraHeaders,...rest}=o;
  const h={'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json'};
  if(extraHeaders) Object.assign(h,extraHeaders);
  if(!('Prefer' in h)) h['Prefer']='return=representation';
  const r=await fetch(`${SB}/rest/v1/${p}`,{headers:h,...rest});
  const t=await r.text();
  if(!r.ok) throw new Error(`${r.status}: ${t}`);
  return t?JSON.parse(t):null;
}

async function load(){try{all=await sbq('requests?select=*&service_type=eq.spa&order=created_at.desc')||[];render();stats();}catch(e){console.error(e);}}

// BOOKINGS
function render(){
  const list=document.getElementById('reqList');
  // merge system bookings + manual walk-ins (exclude those already in requests via source=manual_walkin)
  const walkins=(manualAppts||[]).map(a=>({
    id:'walkin-'+a.id,
    _walkin_id:a.id,
    room_number:'EXT',
    service_type:'spa',
    service_subtype:'treatment',
    status:a.paid?'paid':'confirmed',
    total:a.price||0,
    created_at:a.created_at||a.date+'T'+a.time+':00',
    details:{client_name:a.client_name,treatment:a.treatment,date:a.date,time:a.time,duration:a.duration,room:a.room,source:'manual_walkin'},
    notes:a.notes,
    _isWalkin:true,
    _clientName:a.client_name
  }));
  // only show system bookings that are NOT from manual walk-in
  const systemBookings=(all||[]).filter(r=>{
    try{const det=typeof r.details==='string'?JSON.parse(r.details):r.details||{};return det.source!=='manual_walkin';}catch(e){return true;}
  });
  let merged=[...systemBookings,...walkins].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  let d=merged;
  if(cf==='new') d=merged.filter(r=>r.status==='new');
  else if(cf==='confirmed') d=merged.filter(r=>r.status==='confirmed');
  else if(cf==='completed') d=merged.filter(r=>['completed','paid'].includes(r.status));
  else if(cf==='treatment'||cf==='program'||cf==='class') d=merged.filter(r=>r.service_subtype===cf);
  if(!d.length){list.innerHTML=`<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><p>No bookings</p></div>`;return;}
  const trash=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>`;
  const clockIcon=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const calIcon=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  list.innerHTML=d.map(r=>{
    const det=typeof r.details==='string'?JSON.parse(r.details||'{}'):r.details||{};
    const treatments=det.treatments?Object.keys(det.treatments).join(', '):'';
    const notes=det.notes||r.notes||'';
    const apptTime=det.time||det.appointment||'';
    const detStr=[treatments&&`Treatments: ${treatments}`,notes&&`Note: ${notes}`].filter(Boolean).join(' · ');
    const time=new Date(r.created_at).toLocaleString('en-GB',{timeZone:'Asia/Bangkok',hour12:false,day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const sc={new:'s-new',confirmed:'s-confirmed',completed:'s-completed',paid:'s-paid'}[r.status]||'s-new';
    const sl={new:'New',confirmed:'Confirmed',completed:'Done',paid:'Paid'}[r.status]||'New';
    const dot={new:'#1D4ED8',confirmed:'#B45309',completed:'#166534',paid:'#14532D'}[r.status]||'#1D4ED8';
    const sub=r.service_subtype||'treatment';
    const pillClass={treatment:'sp-treatment',program:'sp-program',class:'sp-class'}[sub]||'sp-default';
    const pillLabel={treatment:'Treatment',program:'Program',class:'Class'}[sub]||sub;
    let actions='';
    if(r._isWalkin){
      // Walk-in: Confirmed → Paid (skip completed step, simpler flow)
      if(r.status!=='paid') actions=`<button class="act-btn btn-paid" onclick="updWalkin('${r._walkin_id}',true)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Mark Paid</button><button class="act-btn btn-rm" onclick="delWalkin('${r._walkin_id}')">${trash}</button>`;
      else actions=`<button class="act-btn btn-rm" style="max-width:100%;flex:1" onclick="delWalkin('${r._walkin_id}')">${trash} Remove</button>`;
    } else {
      if(r.status==='new') actions=`<button class="act-btn btn-confirm" onclick="upd('${r.id}','confirmed')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Confirm</button><button class="act-btn btn-rm" onclick="del('${r.id}')">${trash}</button>`;
      else if(r.status==='confirmed') actions=`<button class="act-btn btn-complete" onclick="upd('${r.id}','completed')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Complete</button><button class="act-btn btn-rm" onclick="del('${r.id}')">${trash}</button>`;
      else if(r.status==='completed') actions=`<button class="act-btn btn-paid" onclick="upd('${r.id}','paid')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Mark Paid</button><button class="act-btn btn-rm" onclick="del('${r.id}')">${trash}</button>`;
      else actions=`<button class="act-btn btn-rm" style="max-width:100%;flex:1" onclick="del('${r.id}')">${trash} Remove</button>`;
    }
    return `<div class="order-card">
      <div class="oc-head">
        <div class="oc-room-badge" style="${r._isWalkin?'background:linear-gradient(135deg,#5B21B6,#7C3AED)':''}">
          ${r._isWalkin?'Walk-in':`Room ${r.room_number}`}
        </div>
        <div class="oc-meta">
          <div class="oc-service">
            <span class="service-pill ${pillClass}">${pillLabel}</span>
            ${r._isWalkin?`<span style="font-size:11px;font-weight:600;color:#5B21B6;margin-left:6px">${r._clientName}</span>`:''}
          </div>
          <div class="oc-time">${clockIcon}${time}</div>
          ${apptTime?`<div class="oc-appt">${calIcon}${apptTime}</div>`:''}
        </div>
        ${r.total>0?`<div class="oc-total">${r.total.toLocaleString()} THB</div>`:''}
        <span class="status-badge ${sc}"><svg width="6" height="6" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="${dot}"/></svg>${sl}</span>
      </div>
      ${detStr?`<div class="oc-details">${detStr}</div>`:''}
      <div class="oc-actions">${actions}</div>
    </div>`;
  }).join('');
  const nc=all.filter(r=>r.status==='new').length;
  const b=document.getElementById('newBadge');
  if(nc>0){b.textContent=nc;b.style.display='inline-block';}else b.style.display='none';
}

function stats(){
  const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
  const td=all.filter(r=>r.created_at.startsWith(today));
  document.getElementById('sNew').textContent=all.filter(r=>r.status==='new').length;
  document.getElementById('sConf').textContent=all.filter(r=>r.status==='confirmed').length;
  document.getElementById('sComp').textContent=td.filter(r=>['completed','paid'].includes(r.status)).length;
  document.getElementById('sRev').textContent=td.filter(r=>r.status==='paid').reduce((s,r)=>s+(r.total||0),0).toLocaleString();
}
async function upd(id,status){try{await sbq(`requests?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});const r=all.find(r=>r.id===id);if(r)r.status=status;render();stats();toast('Updated');}catch(e){toast('Error');}}
async function del(id){if(!confirm('Delete?'))return;try{await sbq(`requests?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':'count=none'}});all=all.filter(r=>r.id!==id);render();stats();toast('Deleted');}catch(e){toast('Error');}}

async function updWalkin(id,paid){
  try{
    await sbq(`spa_appointments?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({paid:paid})});
    await loadManualAppts(); // reload from Supabase
    render();stats();
    renderCalBody();
    // if revenue tab is visible, refresh it too
    const revPage=document.getElementById('pageRevenue');
    if(revPage&&revPage.style.display!=='none') loadRevenue('today',document.getElementById('rTab-today'));
    toast('Marked as Paid');
  }catch(e){console.error(e);toast('Error');}
}

async function delWalkin(id){
  if(!confirm('Delete this walk-in appointment?'))return;
  try{
    const appt=manualAppts.find(a=>a.id===id);
    await sbq(`spa_appointments?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':'count=none'}});
    if(appt&&appt.request_id) await sbq(`requests?id=eq.${appt.request_id}`,{method:'DELETE',headers:{'Prefer':'count=none'}}).catch(()=>{});
    await loadManualAppts();
    await load();
    render();stats();
    renderCalBody();
    toast('Deleted');
  }catch(e){console.error(e);toast('Error');}}

function filt(f,el){cf=f;document.querySelectorAll('#pageBookings .ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}

// ── CALENDAR ENGINE ──
let calView='day', manualAppts=[], editingApptId=null;
const SLOTS=[];
for(let h=9;h<=18;h++){SLOTS.push(`${String(h).padStart(2,'0')}:00`);if(h<18)SLOTS.push(`${String(h).padStart(2,'0')}:30`);}
// SLOTS: 09:00 to 18:30
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function loadManualAppts(){
  try{manualAppts=await sbq('spa_appointments?select=*&order=date,time')||[];}catch(e){manualAppts=[];}
}

function setView(v,el){
  calView=v;
  document.querySelectorAll('.cal-view-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderCalBody();
}

function changeCalDate(dir){
  if(calView==='day') calDate=new Date(calDate.getFullYear(),calDate.getMonth(),calDate.getDate()+dir);
  else if(calView==='week') calDate=new Date(calDate.getFullYear(),calDate.getMonth(),calDate.getDate()+(dir*7));
  else calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);
  renderCalBody();
}

function renderCalBody(){
  if(calView==='day') renderDayView();
  else if(calView==='week') renderWeekView();
  else renderMonthView();
}

function todayStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});}
function dateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function getEventsForDate(dk){
  // system bookings
  const sys=(all||[]).filter(r=>{
    const det=typeof r.details==='string'?JSON.parse(r.details||'{}'):r.details||{};
    const appt=det.date||det.appointment_date||r.created_at.slice(0,10);
    return appt===dk;
  }).map(r=>({id:r.id,type:'system',time:((typeof r.details==='string'?JSON.parse(r.details||'{}'):r.details)||{}).time||'09:00',duration:60,name:`Room ${r.room_number}`,treatment:r.service_subtype||'treatment',room:1}));
  // manual
  const man=manualAppts.filter(a=>a.date===dk).map(a=>({...a,type:'manual'}));
  return [...sys,...man].sort((a,b)=>a.time.localeCompare(b.time));
}

// DAY VIEW
function renderDayView(){
  const dk=dateStr(calDate);
  const isToday=dk===todayStr();
  document.getElementById('calTitle').textContent=`${calDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'Asia/Bangkok'})}`;
  const events=getEventsForDate(dk);
  
  // figure out which slots are occupied
  const occupied={};
  events.forEach(ev=>{
    const si=SLOTS.indexOf(ev.time);
    if(si>=0){const blocks=Math.ceil((ev.duration||60)/30);for(let i=0;i<blocks;i++)if(si+i<SLOTS.length)occupied[SLOTS[si+i]]={ev,isFirst:i===0};}
  });

  let html=`<div class="day-grid">`;
  SLOTS.forEach(slot=>{
    const occ=occupied[slot];
    if(occ&&!occ.isFirst){html+=`<div class="day-slot-row"><div class="day-time"></div><div class="day-slot occupied"></div></div>`;return;}
    if(occ&&occ.isFirst){
      const ev=occ.ev;
      const blocks=Math.ceil((ev.duration||60)/30);
      const isManual=ev.type==='manual';
      html+=`<div class="day-slot-row">
        <div class="day-time">${slot}</div>
        <div class="day-slot occupied">
          <div class="day-appt-block${isManual?' manual':''}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
              <div>
                <div class="day-appt-name">${ev.name||ev.client_name}</div>
                <div class="day-appt-detail">${ev.treatment} · ${ev.duration||60} min · Room ${ev.room||1}</div>
                ${ev.type==='manual'&&ev.price>0?`<div class="day-appt-detail" style="font-weight:700;color:${ev.paid?'#166534':'#B45309'}">${ev.paid?'✓ Paid':'⚠ Unpaid'} · ${ev.price.toLocaleString()} THB</div>`:''}
                ${ev.notes?`<div class="day-appt-detail" style="color:var(--teal-dark)">${ev.notes}</div>`:''}
              </div>
              ${isManual?`<button class="day-appt-delete" onclick="deleteAppt('${ev.id}',event)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>`:''}
            </div>
          </div>
        </div>
      </div>`;
      return;
    }
    html+=`<div class="day-slot-row">
      <div class="day-time">${slot}</div>
      <div class="day-slot" onclick="openModal('${dk}','${slot}')">
        <span class="day-add-hint">+ Add appointment</span>
      </div>
    </div>`;
  });
  html+=`</div>`;
  html+=`<div style="margin-top:12px;text-align:right"><button class="cal-nav-btn" onclick="openModal('${dk}','09:00')" style="background:var(--teal);color:white;border-color:var(--teal)">+ New Appointment</button></div>`;
  document.getElementById('calBody').innerHTML=html;
}

// WEEK VIEW
function renderWeekView(){
  const dow=calDate.getDay();
  const weekStart=new Date(calDate.getFullYear(),calDate.getMonth(),calDate.getDate()-dow);
  const today=todayStr();
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d;});
  document.getElementById('calTitle').textContent=`${weekDays[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${weekDays[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  
  let html=`<div class="week-grid">`;
  // header row
  html+=`<div class="week-time-col"><div class="week-header" style="height:50px"></div>`;
  SLOTS.forEach(s=>html+=`<div class="week-time-lbl">${s}</div>`);
  html+=`</div>`;
  
  weekDays.forEach(day=>{
    const dk=dateStr(day);
    const isT=dk===today;
    const events=getEventsForDate(dk);
    const occupied={};
    events.forEach(ev=>{
      const si=SLOTS.indexOf(ev.time);
      if(si>=0){const blocks=Math.ceil((ev.duration||60)/30);for(let i=0;i<blocks;i++)if(si+i<SLOTS.length)occupied[SLOTS[si+i]]={ev,isFirst:i===0};}
    });
    html+=`<div class="week-col${isT?' today-col':''}">
      <div class="week-header${isT?' today-col':''}" style="height:50px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-soft)">${DAYS_SHORT[day.getDay()]}</div>
        <div style="font-size:16px;font-weight:700;color:${isT?'var(--teal-dark)':'var(--text)'}">${day.getDate()}</div>
      </div>`;
    SLOTS.forEach((slot,si)=>{
      const occ=occupied[slot];
      if(occ&&!occ.isFirst){html+=`<div class="week-slot${isT?' today-col':''}"></div>`;return;}
      if(occ&&occ.isFirst){
        const ev=occ.ev;
        const blocks=Math.ceil((ev.duration||60)/30);
        const h=blocks*48-4;
        const isManual=ev.type==='manual';
        html+=`<div class="week-slot${isT?' today-col':''}" style="position:relative">
          <div class="week-event ${isManual?'ev-manual':'ev-system'}" style="height:${h}px;top:2px">
            ${ev.name||ev.client_name}<br><span style="opacity:.7">${ev.treatment}</span>${ev.type==='manual'&&ev.price>0?`<br><span style="font-size:9px;font-weight:700;color:${ev.paid?'#166534':'#B45309'}">${ev.paid?'✓ Paid':'Unpaid'} · ${ev.price.toLocaleString()} THB</span>`:''}
          </div>
        </div>`;
        return;
      }
      html+=`<div class="week-slot${isT?' today-col':''}" onclick="openModal('${dk}','${slot}')"></div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  document.getElementById('calBody').innerHTML=html;
}

// MONTH VIEW
function renderMonthView(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('calTitle').textContent=`${MONTHS[m]} ${y}`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=todayStr();
  let html=`<div class="cal-month-grid">`;
  html+=DAYS_SHORT.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=days;d++){
    const dk=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=getEventsForDate(dk);
    const isT=dk===today;
    const evHtml=evs.slice(0,3).map(ev=>`<div class="cal-event ${ev.type==='manual'?'ev-manual':'ev-system'}">${ev.time} ${ev.name||ev.client_name}${ev.type==='manual'&&ev.price>0?' · '+(ev.paid?'✓':'⚠'):''}</div>`).join('');
    const more=evs.length>3?`<div class="cal-more">+${evs.length-3} more</div>`:'';
    html+=`<div class="cal-day${isT?' today':''}" onclick="calDayClick('${dk}')"><div class="cal-day-num">${d}</div>${evHtml}${more}</div>`;
  }
  html+=`</div>`;
  document.getElementById('calBody').innerHTML=html;
}

function calDayClick(dk){
  calDate=new Date(dk+'T12:00:00');
  setView('day',document.getElementById('vDay'));
}

// MODAL
function openModal(date, time){
  editingApptId=null;
  document.getElementById('modalTitle').textContent='New Appointment';
  document.getElementById('apptClient').value='';
  document.getElementById('apptTreatment').value='';
  document.getElementById('apptDate').value=date;
  document.getElementById('apptNotes').value='';
  document.getElementById('apptPrice').value='';
  document.getElementById('apptPaid').value='false';
  document.getElementById('apptDuration').value='60';
  document.getElementById('apptRoom').value='1';
  // populate time select
  const sel=document.getElementById('apptTime');
  sel.innerHTML=SLOTS.map(s=>`<option value="${s}"${s===time?' selected':''}>${s}</option>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('apptModal').classList.add('open');
  setTimeout(()=>document.getElementById('apptClient').focus(),100);
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('apptModal').classList.remove('open');
  editingApptId=null;
}
async function saveAppt(){
  const client=document.getElementById('apptClient').value.trim();
  const treatment=document.getElementById('apptTreatment').value.trim();
  const date=document.getElementById('apptDate').value;
  const time=document.getElementById('apptTime').value;
  const duration=parseInt(document.getElementById('apptDuration').value);
  const room=parseInt(document.getElementById('apptRoom').value);
  const notes=document.getElementById('apptNotes').value.trim();
  const price=parseInt(document.getElementById('apptPrice').value)||0;
  const paid=document.getElementById('apptPaid').value==='true';
  if(!client||!treatment||!date||!time){toast('Fill in all required fields');return;}
  const btn=document.getElementById('modalSaveBtn');
  btn.textContent='Saving...';btn.disabled=true;
  try{
    // 1. Save to requests first to get its id
    const reqRes=await sbq('requests',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({
      room_number:'EXT',
      service_type:'spa',
      service_subtype:'treatment',
      status:paid?'paid':'confirmed',
      total:price||0,
      details:JSON.stringify({client_name:client,treatment,date,time,duration,room,source:'manual_walkin'}),
      notes:notes||null
    })});
    const requestId=reqRes&&reqRes[0]?reqRes[0].id:null;

    // 2. Save to spa_appointments with request_id reference
    await sbq('spa_appointments',{method:'POST',body:JSON.stringify({client_name:client,treatment,date,time,duration,room,notes,price,paid,source:'manual',request_id:requestId})});

    await loadManualAppts();
    await load();
    closeModal();
    renderCalBody();
    toast('Appointment saved!');
  }catch(e){console.error(e);toast('Error saving');}
  btn.textContent='Save Appointment';btn.disabled=false;
}
async function deleteAppt(id,ev){
  ev.stopPropagation();
  if(!confirm('Delete this appointment?'))return;
  try{
    const appt=manualAppts.find(a=>a.id===id);
    await sbq(`spa_appointments?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':'count=none'}});
    if(appt&&appt.request_id) await sbq(`requests?id=eq.${appt.request_id}`,{method:'DELETE',headers:{'Prefer':'count=none'}}).catch(()=>{});
    await loadManualAppts();
    await load();
    renderCalBody();
    render();stats();
    toast('Deleted');
  }catch(e){console.error(e);toast('Error');}
}

// REVENUE
async function loadRevenue(period,el){
  document.querySelectorAll('#pageRevenue .ftab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('revenueContent').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  await loadManualAppts(); // always fresh from Supabase
  const today=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Bangkok'}));
  let periodLabel='';
  let dateFilter=(date)=>true;
  if(period==='today'){
    const ts=today.toLocaleDateString('en-CA');
    dateFilter=(date)=>date===ts||date.startsWith(ts);
    periodLabel='Today';
  }else if(period==='week'){
    const sw=new Date(today);sw.setDate(today.getDate()-today.getDay());
    dateFilter=(date)=>new Date(date)>=sw;
    periodLabel='This Week';
  }else if(period==='month'){
    const sm=new Date(today.getFullYear(),today.getMonth(),1);
    dateFilter=(date)=>new Date(date)>=sm;
    periodLabel='This Month';
  }

  // System in-room paid bookings (exclude manual walk-ins)
  const systemPaid=(all||[]).filter(r=>{
    if(r.status!=='paid') return false;
    try{const det=typeof r.details==='string'?JSON.parse(r.details):r.details||{};if(det.source==='manual_walkin')return false;}catch(e){}
    return dateFilter(r.created_at.slice(0,10));
  });

  // Manual walk-in paid appointments
  const walkinPaid=(manualAppts||[]).filter(a=>{
    const p=a.paid===true||a.paid==='true';
    return p && dateFilter((a.created_at||a.date).slice(0,10));
  });

  const systemTotal=systemPaid.reduce((s,r)=>s+(r.total||0),0);
  const walkinTotal=walkinPaid.reduce((s,a)=>s+(a.price||0),0);
  const grandTotal=systemTotal+walkinTotal;
  const totalTx=systemPaid.length+walkinPaid.length;

  // By type — system
  const byType={};
  systemPaid.forEach(r=>{const k=r.service_subtype||'other';byType[k]=(byType[k]||0)+(r.total||0);});
  if(walkinTotal>0) byType['walkin']=(byType['walkin']||0)+walkinTotal;
  const maxT=Math.max(...Object.values(byType),1);
  const typeLabels={treatment:'Treatment',program:'Program',class:'Class',walkin:'Walk-in',other:'Other'};
  const typeRows=Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div class="rev-row"><div class="rev-row-label">${typeLabels[k]||k}</div><div class="rev-row-val">${v.toLocaleString()} THB</div></div>
    <div class="rev-bar-wrap"><div class="rev-bar" style="width:${Math.round(v/maxT*100)}%"></div></div>
  `).join('')||'<p style="font-size:13px;color:var(--text-soft);padding:8px 0">No data</p>';

  // Top rooms (system only)
  const byRoom={};
  systemPaid.forEach(r=>{byRoom[r.room_number]=(byRoom[r.room_number]||0)+(r.total||0);});
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  const roomRows=Object.entries(byRoom).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([room,val],i)=>`
    <div class="top-item"><div class="top-rank">${medals[i]}</div><div class="top-name">Room ${room}</div><div class="top-val">${val.toLocaleString()} THB</div></div>
  `).join('')||'<p style="font-size:13px;color:var(--text-soft);padding:8px 0">No in-room bookings</p>';

  // Walk-in list
  const walkinRows=walkinPaid.length?walkinPaid.map(a=>`
    <div class="rev-row">
      <div class="rev-row-label" style="display:flex;flex-direction:column;gap:1px">
        <span style="font-weight:600">${a.client_name}</span>
        <span style="font-size:11px;color:var(--text-soft)">${a.treatment} · ${a.date} ${a.time}</span>
      </div>
      <div class="rev-row-val">${(a.price||0).toLocaleString()} THB</div>
    </div>
  `).join(''):'<p style="font-size:13px;color:var(--text-soft);padding:8px 0">No walk-in clients</p>';

  document.getElementById('revenueContent').innerHTML=`
    <div class="rev-total-box">
      <div class="rev-total-label">Spa Revenue · ${periodLabel}</div>
      <div class="rev-total-val">${grandTotal.toLocaleString()} <span>THB</span></div>
      <div class="rev-total-sub">${totalTx} paid transaction${totalTx!==1?'s':''} · ${systemPaid.length} in-room · ${walkinPaid.length} walk-in</div>
    </div>
    <div class="rev-grid">
      <div class="rev-card"><div class="rev-card-title">By Service Type</div>${typeRows}</div>
      <div class="rev-card"><div class="rev-card-title">In-Room · Top Rooms</div><div class="top-list">${roomRows}</div></div>
      <div class="rev-card" style="grid-column:1/-1"><div class="rev-card-title">Walk-in Clients</div>${walkinRows}</div>
    </div>`;
}

// TAB SWITCHING
function showTab(tab,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  ['Bookings','Calendar','Revenue'].forEach(p=>{
    const id='page'+p;
    document.getElementById(id).style.display='none';
  });
  document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display='';
  const titles={bookings:'Spa <span>Bookings</span>',calendar:'Spa <span>Calendar</span>',revenue:'Spa <span>Revenue</span>'};
  document.getElementById('topbarTitle').innerHTML=titles[tab];
  if(tab==='calendar'){calDate=new Date();loadManualAppts().then(()=>renderCalBody());}
  if(tab==='revenue')loadRevenue('today',document.getElementById('rTab-today'));
  closeSidebar();
}

// MOBILE SIDEBAR
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}

// TOAST
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

tick();setInterval(tick,1000);
